<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールメーカー - STEAMPUNK</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root { 
    --bg-color: #2b1e16; 
    --text-color: #fdf5e6; 
    --accent-color: #daa520; 
    --border-color: #5d4037; 
    --card-width: 600px; 
  }
  body { 
    font-family: 'serif'; background-color: #1a0f0a; color: var(--text-color); 
    margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
  }
  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }
  
  .main-title {
    text-align: center; color: var(--accent-color); line-height: 1.3; margin: 20px 0;
    text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  .main-title .line-1 { font-size: 1.8rem; display: block; }

  #profile-form { 
    background-color: var(--bg-color); padding: 25px; border: 3px double var(--accent-color); 
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  }
  .form-group { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  
  input[type="text"], textarea { 
    width: 100%; padding: 10px; background: #1a0f0a; border: 1px solid var(--border-color); 
    color: #fff; box-sizing: border-box; font-size: 16px; transition: 0.3s;
  }
  input[type="text"]:focus { border-color: var(--accent-color); outline: none; }

  /* キャラクター選択グリッドの改善 */
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .char-btn { 
    cursor: pointer; border: 1px solid var(--border-color); aspect-ratio: 1/1; background: #3e2723; 
    display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center;
    color: #aaa; transition: 0.2s;
  }
  .char-btn:hover { background: #5d4037; color: #fff; }
  .char-btn.selected { border: 2px solid var(--accent-color); background: #865c2b; color: #fff; box-shadow: 0 0 8px var(--accent-color); }
  
  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  button { 
    flex: 1; padding: 15px; font-weight: bold; cursor: pointer; letter-spacing: 1px; font-size: 1rem;
    border: none; transition: 0.3s;
  }
  #generate-btn { background: #5d4037; color: #fff; border: 1px solid var(--accent-color); }
  #download-btn { background: var(--accent-color); color: #000; }
  button:hover { filter: brightness(1.2); transform: translateY(-2px); }

  #output-area { width: 100%; margin-top: 20px; position: relative; }
  /* Canvas自体は計算用。表示は高品質なImgで行う */
  #card-canvas { display: none; }
  #final-image { width: 100%; border: 4px solid var(--accent-color); box-shadow: 0 10px 40px rgba(0,0,0,0.7); background: #000; }
</style>
</head>
<body>

  <div class="main-title">
    <span class="line-1">⚙ HISOUTENSOKU ⚙</span>
    <small>PROFILE GENERATOR</small>
  </div>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>プレイヤー名</label><input type="text" id="name" maxlength="15" oninput="updatePreview()" placeholder="名前を入力"></div>
      <div class="form-group"><label>段位 / レート</label><input type="text" id="rank" maxlength="20" oninput="updatePreview()" placeholder="例: 龍神 / 1800"></div>
      
      <div class="form-group">
        <label>メインキャラ選択</label>
        <div id="main-char-selector" class="char-grid"></div>
        <div id="color-selector" style="display:flex; gap:5px; margin-top:10px; flex-wrap: wrap;"></div>
      </div>

      <div class="form-group"><label>一言コメント</label><textarea id="comment" maxlength="100" rows="3" oninput="updatePreview()" placeholder="よろしくお願いします！"></textarea></div>
      
      <div class="btn-group">
        <button type="button" id="generate-btn" onclick="updatePreview()">プレビュー更新</button>
        <button type="button" id="download-btn" onclick="downloadImage()">画像として保存</button>
      </div>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="500"></canvas>
      <img id="final-image" alt="Profile Card">
      <p style="font-size: 12px; color: #888; margin-top: 10px;">※画像が表示されない場合は「プレビュー更新」を押してください</p>
    </div>
  </div>

<script>
const charData = {
  "博麗 霊夢":"reimu","霧雨 魔理沙":"marisa","十六夜 咲夜":"sakuya",
  "アリス":"alice","パチュリー":"patche","魂魄 妖夢":"youmu",
  "レミリア":"remilia","西行寺 幽々子":"yuyuko","八雲 紫":"yukari",
  "伊吹 萃香":"suika","鈴仙":"reisen","射命丸 文":"aya",
  "小野塚 小町":"komachi","永江 衣玖":"iku","比那名居 天子":"tenshi",
  "東風谷 早苗":"sanae","チルノ":"cirno","紅 美鈴":"meirin",
  "霊烏路 空":"utsuho","洩矢 諏訪子":"suwako"
};

let selectedMain = "博麗 霊夢", selectedColor = "1";
let charImage = new Image();

window.onload = () => {
  const mS = document.getElementById('main-char-selector');
  Object.keys(charData).forEach(name => {
    const mb = document.createElement('div'); mb.className='char-btn'; mb.innerText=name;
    if(name===selectedMain) mb.classList.add('selected');
    mb.onclick=()=>{
      document.querySelectorAll('#main-char-selector .char-btn').forEach(e=>e.classList.remove('selected'));
      mb.classList.add('selected'); selectedMain=name; loadCharImage();
    };
    mS.appendChild(mb);
  });
  updateColorSelector();
  loadCharImage();
};

function updateColorSelector() {
  const c = document.getElementById('color-selector'); c.innerHTML='';
  for(let i=1;i<=8;i++){
    const b=document.createElement('button'); 
    b.style.cssText = "padding: 5px 10px; cursor: pointer; background: #3e2723; color: #fff; border: 1px solid #daa520;";
    if(i==selectedColor) b.style.background = "#daa520";
    b.innerText=i+'P';
    b.onclick=(e)=>{e.preventDefault(); selectedColor=i; updateColorSelector(); loadCharImage();}; 
    c.appendChild(b);
  }
}

function loadCharImage() {
  const folder = charData[selectedMain];
  // 以前のパス形式を維持（画像がない場合はプレビューのみ更新）
  charImage.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;
  charImage.onload = () => updatePreview();
  charImage.onerror = () => updatePreview();
}

function updatePreview() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  
  // 背景描画
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 500);
  
  // 網掛け（ドット）追加
  ctx.fillStyle = 'rgba(218, 165, 32, 0.05)';
  for(let i=0; i<800; i+=6) {
    for(let j=0; j<500; j+=6) {
      ctx.fillRect(i, j, 1, 1);
    }
  }

  // 枠線
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(15, 15, 770, 470);
  ctx.lineWidth = 1; ctx.strokeRect(25, 25, 750, 450);

  // テキスト描画
  ctx.fillStyle = brass; ctx.font = 'bold 20px serif'; ctx.fillText('⚙ HISOUTENSOKU PROFILE ⚙', 45, 60);

  const name = document.getElementById('name').value || 'NO NAME';
  const rank = document.getElementById('rank').value || '---';
  const comment = document.getElementById('comment').value || 'よろしくお願いします。';

  ctx.fillStyle = brass; ctx.font = '12px serif'; ctx.fillText('【 PLAYER NAME 】', 50, 110);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 50px serif'; ctx.fillText(name, 50, 170);

  ctx.fillStyle = brass; ctx.font = '12px serif'; ctx.fillText('【 RANK / RATE 】', 50, 220);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 28px serif'; ctx.fillText(rank, 50, 255);

  ctx.fillStyle = brass; ctx.font = '12px serif'; ctx.fillText('【 MAIN CHARACTER 】', 50, 310);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 22px serif'; ctx.fillText(`${selectedMain} (${selectedColor}P)`, 50, 345);

  ctx.fillStyle = brass; ctx.font = '12px serif'; ctx.fillText('【 COMMENT 】', 50, 390);
  ctx.fillStyle = '#fdf5e6'; ctx.font = '18px serif';
  // 簡易改行処理
  let words = comment.split(''); let line = '';
  let y = 420;
  for(let n=0; n<words.length; n++) {
    line += words[n];
    if(line.length > 20) { ctx.fillText(line, 50, y); line = ''; y += 25; }
  }
  ctx.fillText(line, 50, y);

  // キャラ画像描画（右側）
  if(charImage.complete && charImage.naturalWidth !== 0) {
    ctx.drawImage(charImage, 450, 80, 300, 340); // サイズ調整
    ctx.strokeStyle = brass; ctx.lineWidth = 2; ctx.strokeRect(448, 78, 304, 344);
  } else {
    ctx.strokeStyle = '#5d4037'; ctx.setLineDash([5, 5]);
    ctx.strokeRect(450, 80, 300, 340);
    ctx.fillStyle = '#5d4037'; ctx.font = '14px serif'; ctx.fillText('NO IMAGE', 560, 250);
    ctx.setLineDash([]);
  }

  // 画像要素へ反映
  document.getElementById('final-image').src = canvas.toDataURL('image/png');
}

// 画像保存機能
function downloadImage() {
  const link = document.createElement('a');
  const name = document.getElementById('name').value || 'th123';
  link.download = `Profile_${name}.png`;
  link.href = document.getElementById('final-image').src;
  link.click();
}
</script>
</body>
</html>
