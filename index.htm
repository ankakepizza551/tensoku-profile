<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールカードメーカー PRO</title>
<style>
  :root {
    --bg-color: #1a1a1a;
    --text-color: #e0e0e0;
    --accent-color: #00ff99;
    --border-color: #444;
    --card-width: 600px;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: #121212;
    color: var(--text-color);
    margin: 0; padding: 10px;
    display: flex; flex-direction: column; align-items: center;
  }

  h1 { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); font-size: 1.2rem; margin-bottom: 20px; }

  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }

  #profile-form {
    background-color: var(--bg-color);
    padding: 20px; border-radius: 12px;
    border: 1px solid var(--border-color);
    box-sizing: border-box;
  }

  .form-group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  
  input[type="text"], textarea {
    width: 100%; padding: 12px; background: #000; border: 1px solid var(--border-color);
    border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box;
  }

  /* キャラアイコン選択 */
  .char-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px;
  }
  .char-icon-item {
    cursor: pointer; border: 2px solid #333; border-radius: 4px; aspect-ratio: 1/1;
    background: #222; display: flex; align-items: center; justify-content: center;
    transition: 0.2s; color: #888; font-size: 10px; text-align: center; line-height: 1.2;
  }
  .char-icon-item.selected { border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); color: var(--accent-color); background: #000; }

  /* カラー選択 */
  .color-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .color-btn {
    padding: 8px 12px; background: #333; border: 1px solid #555; color: #fff;
    cursor: pointer; border-radius: 4px; font-size: 12px;
  }
  .color-btn.selected { background: var(--accent-color); color: #000; font-weight: bold; border-color: var(--accent-color); }

  .inline-group { display: flex; gap: 12px; flex-wrap: wrap; }
  .inline-group label { color: #fff; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; }

  button#generate-btn {
    width: 100%; padding: 18px; background: #000; color: var(--accent-color);
    border: 2px solid var(--accent-color); border-radius: 8px;
    font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
  }
  button#generate-btn:hover { background: var(--accent-color); color: #000; }

  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
</style>
</head>
<body>

  <h1>HISOUTENSOKU PROFILE GENERATOR</h1>

  <div class="container">
    <form id="profile-form">
      <div class="form-group">
        <label>プレイヤー名 / 段位・レート</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="name" placeholder="Name" style="flex: 2;">
          <input type="text" id="rank" placeholder="例: Lunatic / 1650" style="flex: 1;">
        </div>
      </div>

      <div class="form-group">
        <label>メインキャラ選択 & カラー</label>
        <div id="char-selector" class="char-grid"></div>
        <div id="color-selector" class="color-chips"></div>
      </div>

      <div class="form-group">
        <label>プレイスタイル / ホスト設定</label>
        <div class="inline-group">
          <label><input type="radio" name="style" value="ガチ勢" checked> ガチ勢</label>
          <label><input type="radio" name="style" value="エンジョイ"> エンジョイ</label>
          <span style="color:#444">|</span>
          <label><input type="radio" name="side" value="ホスト派" checked> ホスト派</label>
          <label><input type="radio" name="side" value="クラ派"> クラ派</label>
          <label><input type="radio" name="side" value="両方可"> 両方可</label>
        </div>
      </div>

      <div class="form-group">
        <label>活動時間帯 / デバイス</label>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <input type="text" id="time" placeholder="例: 平日22時〜" style="flex: 1;">
          <input type="text" id="device" placeholder="例: リアルアーケードPro" style="flex: 1;">
        </div>
      </div>

      <div class="form-group">
        <label>外部ツール</label>
        <div class="inline-group">
          <label><input type="checkbox" id="tool-tenco" checked> Tenco</label>
          <label><input type="checkbox" id="tool-punch"> パンチ</label>
          <label><input type="checkbox" id="tool-giu"> giu</label>
          <label><input type="checkbox" id="tool-socro"> ソクロ</label>
        </div>
      </div>

      <div class="form-group">
        <label>得意・苦手キャラ / 他ゲーム</label>
        <input type="text" id="matchup" placeholder="得意: 霊夢 / 苦手: 萃香" style="margin-bottom: 10px;">
        <input type="text" id="other-games" placeholder="例: スト6、DTMなど">
      </div>

      <div class="form-group">
        <label>サブキャラ・一言コメント</label>
        <textarea id="comment" rows="2" placeholder="自由に入力してください"></textarea>
      </div>

      <button type="button" id="generate-btn" onclick="generateCard()">カードを生成する</button>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="500"></canvas>
      <img id="final-image" alt="Profile Card" style="display:none;">
      <p style="color: #888; font-size: 0.8em; margin-top: 10px;">画像を長押しして保存してね</p>
    </div>
  </div>

<script>
const charData = {
  "博麗 霊夢": "reimu", "霧雨 魔理沙": "marisa", "東風谷 早苗": "sanae", "チルノ": "cirno", 
  "紅 美鈴": "meirin", "十六夜 咲夜": "sakuya", "アリス": "alice", "伊吹 萃香": "suika", 
  "鈴仙": "reisen", "射命丸 文": "aya", "小野塚 小町": "komachi", "永江 衣玖": "iku", 
  "比那名居 天子": "tenshi", "パチュリー": "patche", "西行寺 幽々子": "yuyuko", 
  "八雲 紫": "yukari", "洩矢 諏訪子": "suwako", "霊烏路 空": "utsuho", 
  "魂魄 妖夢": "youmu", "レミリア": "remilia"
};

let selectedChar = "博麗 霊夢";
let selectedColor = "1";

window.onload = () => {
  const selector = document.getElementById('char-selector');
  Object.keys(charData).forEach(name => {
    const item = document.createElement('div');
    item.className = 'char-icon-item';
    if(name === selectedChar) item.classList.add('selected');
    item.innerHTML = `<span>${name.replace(' ', '<br>')}</span>`;
    item.onclick = () => {
      document.querySelectorAll('.char-icon-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');
      selectedChar = name;
    };
    selector.appendChild(item);
  });
  updateColorSelector();
};

function updateColorSelector() {
  const container = document.getElementById('color-selector');
  container.innerHTML = '';
  for(let i=1; i<=8; i++) {
    const btn = document.createElement('button');
    btn.className = 'color-btn';
    if(i == selectedColor) btn.classList.add('selected');
    btn.innerText = i + 'P';
    btn.onclick = (e) => {
      e.preventDefault();
      selectedColor = i;
      updateColorSelector();
    };
    container.appendChild(btn);
  }
}

function generateCard() {
  const canvas = document.getElementById('card-canvas');
  const ctx = canvas.getContext('2d');
  const accent = '#00ff99';

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 800, 500);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.strokeRect(15, 15, 770, 470);

  ctx.fillStyle = accent;
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText('HISOUTENSOKU PLAYER PROFILE', 40, 55);

  function drawItem(label, value, x, y, size=18, color='#fff') {
    ctx.fillStyle = accent;
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(label, x, y);
    ctx.fillStyle = color;
    ctx.font = size + 'px sans-serif';
    ctx.fillText(value, x, y + 25);
  }

  const name = document.getElementById('name').value || 'Nanashi';
  const rank = document.getElementById('rank').value || '-';
  const style = document.querySelector('input[name="style"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const time = document.getElementById('time').value || '-';
  const device = document.getElementById('device').value || '-';
  const matchup = document.getElementById('matchup').value || '-';
  const other = document.getElementById('other-games').value || '-';
  const comment = document.getElementById('comment').value || '-';
  const tools = [
    document.getElementById('tool-tenco').checked ? 'Tenco' : null,
    document.getElementById('tool-punch').checked ? 'Punch' : null,
    document.getElementById('tool-giu').checked ? 'giu' : null,
    document.getElementById('tool-socro').checked ? 'socro' : null
  ].filter(t => t).join(' / ') || 'None';

  drawItem('PLAYER NAME', name, 45, 100, 30);
  drawItem('RANK / RATE', rank, 45, 170, 22);
  drawItem('STYLE / SIDE', `${style} / ${side}`, 45, 230);
  drawItem('ACTIVITY / DEVICE', `${time} / ${device}`, 45, 290);
  drawItem('TOOLS', tools, 45, 350);
  drawItem('MATCHUP / OTHER', `${matchup} [${other}]`, 45, 410, 15);
  drawItem('COMMENT / SUB', comment, 45, 465, 14, '#aaa');

  const img = new Image();
  const folder = charData[selectedChar];
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;

  img.onload = () => {
    ctx.shadowBlur = 15; ctx.shadowColor = accent;
    ctx.drawImage(img, 460, 80, 280, 330);
    ctx.shadowBlur = 0;
    finalize();
  };
  img.onerror = () => {
    ctx.fillStyle = '#222'; ctx.fillRect(460, 80, 280, 330);
    finalize();
  };

  function finalize() {
    const finalImg = document.getElementById('final-image');
    finalImg.src = canvas.toDataURL('image/png');
    finalImg.style.display = 'block';
  }
}
</script>
</body>
</html>
