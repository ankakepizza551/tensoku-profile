<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東方非想天則 プロフィールカードメーカー</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=M+PLUS+1p:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --hiso-red: #600000;
            --hiso-gold: #d4af37;
            --hiso-dark: #1a1a1a;
        }

        body {
            font-family: 'M PLUS 1p', sans-serif;
            background-color: #222;
            color: #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* --- 入力フォームのスタイル --- */
        #editor {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--hiso-gold); }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            background: #444;
            border: 1px solid #666;
            color: #fff;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .tag-btn {
            padding: 6px 12px;
            background: #444;
            border: 1px solid var(--hiso-gold);
            color: #ddd;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .tag-btn.active {
            background: var(--hiso-gold);
            color: #000;
            font-weight: bold;
        }

        button#save-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #800;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button#save-btn:hover { background: #a00; }

        /* --- カードプレビューのスタイル --- */
        #card-canvas {
            position: relative;
            width: 600px;
            height: 350px;
            background: linear-gradient(135deg, var(--hiso-red) 0%, #200 100%);
            border: 6px double var(--hiso-gold);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            font-family: 'Noto Serif JP', serif;
        }

        /* 網掛けオーバーレイ */
        .dot-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0,0,0,0.4) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: 1;
        }

        .card-inner {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #display-name {
            font-size: 42px;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            border-bottom: 2px solid var(--hiso-gold);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            font-size: 18px;
        }

        .info-label {
            color: var(--hiso-gold);
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
            font-family: sans-serif;
        }

        #display-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-tag {
            background: rgba(0,0,0,0.5);
            border-left: 4px solid var(--hiso-gold);
            padding: 4px 12px;
            font-size: 16px;
        }

        .placeholder-icon {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 150px;
            height: 200px;
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <h1>非想天則プロフメーカー</h1>

    <div id="editor">
        <div class="input-group">
            <label>プレイヤー名</label>
            <input type="text" id="input-name" placeholder="名前を入力" oninput="updateCard()">
        </div>

        <div class="input-group">
            <label>コメント</label>
            <input type="text" id="input-comment" placeholder="一言メッセージ" oninput="updateCard()">
        </div>

        <div class="input-group">
            <label>プレイスタイル（クリックで選択）</label>
            <div class="tag-container">
                <button class="tag-btn" onclick="toggleTag(this)">立ち回り重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">固め重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">火力重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">愛キャラ勢</button>
                <button class="tag-btn" onclick="toggleTag(this)">対戦募集中</button>
                <button class="tag-btn" onclick="toggleTag(this)">ネット対戦メイン</button>
            </div>
        </div>

        <button id="save-btn" onclick="saveCard()">画像として書き出し (PNG)</button>
    </div>

    <div id="card-canvas">
        <div class="dot-pattern"></div>
        <div class="card-inner">
            <div>
                <span class="info-label">PLAYER NAME</span>
                <h2 id="display-name">NO NAME</h2>
            </div>

            <div class="card-info">
                <div class="info-item">
                    <span class="info-label">STYLE</span>
                    <div id="display-tags">
                        </div>
                </div>
                <div class="info-item">
                    <span class="info-label">COMMENT</span>
                    <div id="display-comment">よろしくお願いします。</div>
                </div>
            </div>
            
            <div class="placeholder-icon">
                ここにアイコンを<br>表示予定
            </div>
        </div>
    </div>

    <script>
        // 文字の同期
        function updateCard() {
            const name = document.getElementById('input-name').value;
            const comment = document.getElementById('input-comment').value;

            document.getElementById('display-name').innerText = name || "NO NAME";
            document.getElementById('display-comment').innerText = comment || "よろしくお願いします。";
        }

        // タグの切り替え
        function toggleTag(btn) {
            btn.classList.toggle('active');
            
            const displayTags = document.getElementById('display-tags');
            displayTags.innerHTML = '';
            
            const activeButtons = document.querySelectorAll('.tag-btn.active');
            activeButtons.forEach(activeBtn => {
                const span = document.createElement('span');
                span.className = 'card-tag';
                span.innerText = activeBtn.innerText;
                displayTags.appendChild(span);
            });
        }

        // 画像として保存
        function saveCard() {
            const card = document.getElementById('card-canvas');
            const btn = document.getElementById('save-btn');
            
            btn.innerText = "書き出し中...";
            
            html2canvas(card, {
                scale: 2, // 高解像度で保存
                backgroundColor: null,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Hisoutensoku_Profile.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerText = "画像として書き出し (PNG)";
            });
        }
    </script>
</body>
</html>
