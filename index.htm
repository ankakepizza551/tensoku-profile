<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非想天則風プロフィールジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #000000;
            --accent-gold: #d4af37;
            --text-white: #ffffff;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* スマホで見やすい幅に固定 */
            display: flex;
            flex-direction: column; /* 縦並びに変更 */
            gap: 20px;
        }

        .input-section {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-section h2 {
            font-size: 1.1rem;
            margin-top: 0;
            border-left: 4px solid var(--accent-gold);
            padding-left: 10px;
        }

        .form-group { margin-bottom: 15px; }

        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* プレビューエリアの修正 */
        .preview-section {
            width: 100%;
        }

        .preview-card {
            width: 100%;
            min-height: 200px;
            background: var(--card-bg);
            border: 2px solid var(--accent-gold);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        .p-label {
            font-family: 'Oswald', sans-serif;
            color: var(--accent-gold);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin: 0;
        }

        #p-name {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
            font-size: 2rem;
            margin: 0;
            letter-spacing: 0.05em;
        }

        #p-rank {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0;
        }

        #p-comment {
            font-family: 'Noto Serif JP', serif;
            font-size: 0.9rem;
            border-top: 1px solid #333;
            padding-top: 10px;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-section">
        <h2>設定入力</h2>
        <div class="form-group">
            <label>キャラクター名</label>
            <input type="text" id="in-name" placeholder="博麗 霊夢" oninput="update()">
        </div>
        <div class="form-group">
            <label>ランク (英数字)</label>
            <input type="text" id="in-rank" placeholder="LUNATIC" oninput="update()">
        </div>
        <div class="form-group">
            <label>一言コメント</label>
            <input type="text" id="in-comment" placeholder="空を飛ぶ程度の能力" oninput="update()">
        </div>
    </div>

    <div class="preview-section">
        <div class="preview-card">
            <div>
                <p class="p-label">Player Name</p>
                <h1 id="p-name">博麗 霊夢</h1>
            </div>
            <div>
                <p class="p-label">Rank Status</p>
                <p id="p-rank">LUNATIC</p>
            </div>
            <div>
                <p id="p-comment">空を飛ぶ程度の能力</p>
            </div>
        </div>
    </div>
</div>

<script>
    function update() {
        document.getElementById('p-name').innerText = document.getElementById('in-name').value || '博麗 霊夢';
        document.getElementById('p-rank').innerText = (document.getElementById('in-rank').value || 'LUNATIC').toUpperCase();
        document.getElementById('p-comment').innerText = document.getElementById('in-comment').value || '空を飛ぶ程度の能力';
    }
</script>

</body>
</html>
