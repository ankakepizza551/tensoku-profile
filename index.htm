<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>東方非想天則プロフィールカード作成ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        
        /* 入力エリア（以前のシンプルなスタイル） */
        #controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px;
            width: 550px;
        }
        .input-item { margin-bottom: 10px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input[type="text"] { width: 300px; padding: 5px; }

        /* タグ選択ボタン */
        .tag-btn {
            padding: 5px 10px;
            margin: 2px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            border-radius: 3px;
        }
        .tag-btn.active {
            background: #e0e0e0;
            border-color: #888;
            font-weight: bold;
        }

        /* カード本体（以前の配色・レイアウト） */
        #card {
            position: relative;
            width: 600px;
            height: 350px;
            background: #fff; /* 背景色を白に戻す */
            border: 2px solid #333;
            overflow: hidden;
            font-family: 'Noto Serif JP', serif; /* フォントは和風 */
        }

        /* 網掛け（ドット）の装飾 */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 5px 5px;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 30px;
        }

        #out-name {
            font-size: 36px;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        .info-row { margin-bottom: 15px; font-size: 20px; }
        .info-label { font-size: 14px; color: #666; display: block; }

        #out-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag-display {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 2px 8px;
            font-size: 16px;
            border-radius: 4px;
        }

        /* アイコン枠（作成中とのことなので枠だけ維持） */
        #icon-preview {
            position: absolute;
            right: 30px;
            bottom: 30px;
            width: 150px;
            height: 150px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        #save-button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #save-button:hover { background: #666; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="input-item">
            <label>名前</label>
            <input type="text" id="in-name" oninput="sync()">
        </div>
        <div class="input-item">
            <label>コメント</label>
            <input type="text" id="in-comment" oninput="sync()">
        </div>
        <div class="input-item">
            <label>スタイル</label>
            <div id="tag-options">
                <button class="tag-btn" onclick="toggleTag(this)">立ち回り重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">固め重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">火力重視</button>
                <button class="tag-btn" onclick="toggleTag(this)">愛キャラ勢</button>
                <button class="tag-btn" onclick="toggleTag(this)">対戦募集中</button>
            </div>
        </div>
        <button id="save-button" onclick="downloadCard()">画像として保存</button>
    </div>

    <div id="card">
        <div class="grid-overlay"></div>
        <div class="card-content">
            <div class="info-label">PLAYER NAME</div>
            <div id="out-name">名前未設定</div>
            
            <div class="info-row">
                <div class="info-label">PLAY STYLE</div>
                <div id="out-tags"></div>
            </div>

            <div class="info-row">
                <div class="info-label">COMMENT</div>
                <div id="out-comment">よろしくお願いします。</div>
            </div>
        </div>
        <div id="icon-preview">アイコン枠</div>
    </div>

    <script>
        // 文字入力の同期
        function sync() {
            const name = document.getElementById('in-name').value;
            const comment = document.getElementById('in-comment').value;
            
            document.getElementById('out-name').innerText = name || "名前未設定";
            document.getElementById('out-comment').innerText = comment || "よろしくお願いします。";
        }

        // タグの切り替え
        function toggleTag(btn) {
            btn.classList.toggle('active');
            const outTags = document.getElementById('out-tags');
            outTags.innerHTML = '';
            
            const activeBtns = document.querySelectorAll('.tag-btn.active');
            activeBtns.forEach(b => {
                const span = document.createElement('span');
                span.className = 'tag-display';
                span.innerText = b.innerText;
                outTags.appendChild(span);
            });
        }

        // 画像保存
        function downloadCard() {
            const cardElement = document.getElementById('card');
            html2canvas(cardElement).then(canvas => {
                const link = document.createElement('a');
                link.download = 'th123-profile.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
