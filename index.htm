<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールカードメーカー PRO</title>
<style>
  /* スタイルは前回のものを継承しつつ、フォームが見やすいよう微調整 */
  :root { --bg-color: #1a1a1a; --text-color: #e0e0e0; --accent-color: #00ff99; --border-color: #444; --card-width: 600px; }
  body { font-family: sans-serif; background-color: #121212; color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }
  #profile-form { background-color: var(--bg-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
  .form-group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  input[type="text"], textarea { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border-color); border-radius: 6px; color: #fff; box-sizing: border-box; }
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .char-btn { cursor: pointer; border: 1px solid #333; border-radius: 4px; aspect-ratio: 1/1; background: #222; display: flex; align-items: center; justify-content: center; font-size: 11px; text-align: center; }
  .char-btn.selected { border-color: var(--accent-color); color: var(--accent-color); box-shadow: inset 0 0 5px var(--accent-color); }
  button#generate-btn { width: 100%; padding: 15px; background: #000; color: var(--accent-color); border: 2px solid var(--accent-color); border-radius: 8px; font-weight: bold; cursor: pointer; }
  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border-radius: 12px; }
</style>
</head>
<body>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>プレイヤー名</label><input type="text" id="name" placeholder="Name"></div>
      <div class="form-group"><label>段位 / レート</label><input type="text" id="rank" placeholder="Lunatic / 1650"></div>
      <div class="form-group">
        <label>メイン / カラー</label>
        <div id="main-char-selector" class="char-grid"></div>
        <div id="color-selector" style="display:flex; gap:5px; margin-top:10px;"></div>
      </div>
      <div class="form-group"><label>サブキャラ</label><div id="sub-char-selector" class="char-grid"></div></div>
      <div class="form-group"><label>時間帯 / デバイス</label>
        <input type="text" id="time" placeholder="22時〜" style="width:48%; margin-right:2%;">
        <input type="text" id="device" placeholder="RAP" style="width:48%;">
      </div>
      <div class="form-group"><label>得意・苦手 / ツール</label>
        <input type="text" id="matchup" placeholder="妖夢得意" style="width:48%; margin-right:2%;">
        <input type="text" id="tools-text" placeholder="Tenco/Punch" style="width:48%;">
      </div>
      <div class="form-group"><label>他ゲーム / コメント</label>
        <input type="text" id="other-games" placeholder="DTM" style="margin-bottom:10px;">
        <textarea id="comment" rows="2" maxlength="100" placeholder="最大100文字"></textarea>
      </div>
      <button type="button" id="generate-btn" onclick="generateCard()">カードを生成</button>
    </form>
    <div id="output-area">
      <canvas id="card-canvas" width="800" height="600"></canvas>
      <img id="final-image">
    </div>
  </div>

<script>
const charData = {"博麗 霊夢":"reimu","霧雨 魔理沙":"marisa","東風谷 早苗":"sanae","チルノ":"cirno","紅 美鈴":"meirin","十六夜 咲夜":"sakuya","アリス":"alice","伊吹 萃香":"suika","鈴仙":"reisen","射命丸 文":"aya","小野塚 小町":"komachi","永江 衣玖":"iku","比那名居 天子":"tenshi","パチュリー":"patche","西行寺 幽々子":"yuyuko","八雲 紫":"yukari","洩矢 諏訪子":"suwako","霊烏路 空":"utsuho","魂魄 妖夢":"youmu","レミリア":"remilia"};
let selectedMain = "博麗 霊夢", selectedSubs = [], selectedColor = "1";

window.onload = () => {
  const mainDiv = document.getElementById('main-char-selector'), subDiv = document.getElementById('sub-char-selector');
  Object.keys(charData).forEach(name => {
    const m = document.createElement('div'); m.className = 'char-btn'; m.innerHTML = name.replace(' ','<br>');
    if(name===selectedMain) m.classList.add('selected');
    m.onclick = () => { document.querySelectorAll('#main-char-selector .char-btn').forEach(e=>e.classList.remove('selected')); m.classList.add('selected'); selectedMain=name; };
    mainDiv.appendChild(m);
    const s = document.createElement('div'); s.className = 'char-btn'; s.innerHTML = name.replace(' ','<br>');
    s.onclick = () => { if(selectedSubs.includes(name)){selectedSubs=selectedSubs.filter(n=>n!==name); s.classList.remove('selected');}else{selectedSubs.push(name); s.classList.add('selected');} };
    subDiv.appendChild(s);
  });
  const colorDiv = document.getElementById('color-selector');
  for(let i=1;i<=8;i++){
    const b = document.createElement('button'); b.innerText = i+'P'; b.style.padding='5px 10px';
    b.onclick = (e) => { e.preventDefault(); selectedColor = i; };
    colorDiv.appendChild(b);
  }
};

function drawWrap(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  let lines = [], line = '';
  for (let n = 0; n < text.length; n++) {
    let test = line + text[n];
    if (ctx.measureText(test).width > maxWidth && n > 0) { lines.push(line); line = text[n]; } else { line = test; }
  }
  lines.push(line);
  lines.slice(0, maxLines).forEach((l, i) => {
    if (i === maxLines - 1 && lines.length > maxLines) l += '...';
    ctx.fillText(l, x, y + (i * lineHeight));
  });
}

function generateCard() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), accent = '#00ff99';
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,800,600);
  ctx.strokeStyle = accent; ctx.lineWidth = 3; ctx.strokeRect(15,15,770,570);
  
  ctx.fillStyle = accent; ctx.font = 'bold 24px sans-serif'; ctx.fillText('HISOUTENSOKU PLAYER PROFILE', 45, 60);

  const drawLbl = (l, x, y) => { ctx.fillStyle = accent; ctx.font = 'bold 13px sans-serif'; ctx.fillText(l, x, y); };

  // 1. プレイヤー名を下げて配置
  drawLbl('PLAYER NAME', 50, 130);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 44px sans-serif'; ctx.fillText(document.getElementById('name').value || 'Nanashi', 50, 175);

  drawLbl('RANK / RATE', 50, 215);
  ctx.font = 'bold 24px sans-serif'; ctx.fillText(document.getElementById('rank').value || '-', 50, 245);

  drawLbl('MAIN CHARACTER', 50, 285);
  ctx.font = 'bold 20px sans-serif'; ctx.fillText(`${selectedMain} (${selectedColor}P)`, 50, 315);

  // 2. サブキャラエリアを拡大 (最大5行)
  drawLbl('SUB CHARACTERS', 50, 355);
  ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#ddd';
  drawWrap(ctx, selectedSubs.join(', ') || 'なし', 50, 380, 380, 22, 5);

  // 3. 2カラムレイアウトで情報を整理
  drawLbl('ACTIVITY / DEVICE', 50, 515);
  ctx.font = 'bold 16px sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(`${document.getElementById('time').value || '-'} / ${document.getElementById('device').value || '-'}`, 50, 540);

  drawLbl('TOOLS', 50, 570);
  ctx.font = 'bold 14px sans-serif'; ctx.fillText(document.getElementById('tools-text').value || '-', 50, 590);

  // 右側：画像とマッチアップ
  drawLbl('MATCHUP', 460, 445);
  ctx.font = 'bold 15px sans-serif'; ctx.fillText(document.getElementById('matchup').value || '-', 460, 470);

  drawLbl('OTHER INTERESTS', 460, 505);
  ctx.font = 'bold 14px sans-serif'; drawWrap(ctx, document.getElementById('other-games').value || '-', 460, 525, 290, 18, 2);

  drawLbl('COMMENT', 460, 560);
  ctx.fillStyle = '#bbb'; ctx.font = 'bold 13px sans-serif';
  drawWrap(ctx, document.getElementById('comment').value || '-', 460, 580, 290, 16, 2);

  const img = new Image(); const folder = charData[selectedMain];
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;
  img.onload = () => {
    ctx.shadowBlur = 20; ctx.shadowColor = accent;
    ctx.drawImage(img, 460, 85, 290, 340);
    ctx.shadowBlur = 0;
    document.getElementById('final-image').src = canvas.toDataURL();
  };
}
</script>
</body>
</html>
