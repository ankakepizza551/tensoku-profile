<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールメーカー - STEAMPUNK EDITION</title>
<style>
  :root { 
    --bg-color: #2b1e16; /* 焦げ茶 */
    --text-color: #fdf5e6; /* アイボリー */
    --accent-color: #daa520; /* 真鍮・金 */
    --border-color: #5d4037; 
    --card-width: 600px; 
  }
  body { 
    font-family: 'Georgia', 'serif', 'Hiragino Mincho ProN', serif; 
    background-color: #1a0f0a; 
    color: var(--text-color); 
    margin: 0; padding: 10px; 
    display: flex; flex-direction: column; align-items: center; 
  }
  h1 { 
    color: var(--accent-color); 
    text-shadow: 2px 2px 4px #000; 
    font-size: 1.2rem; margin-bottom: 20px; 
    letter-spacing: 2px;
  }
  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }
  #profile-form { 
    background-color: var(--bg-color); 
    padding: 20px; border-radius: 4px; 
    border: 3px double var(--accent-color); /* 二重線でアンティーク感を出す */
    box-sizing: border-box; 
  }
  .form-group { margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
  label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  
  input[type="text"], textarea { 
    width: 100%; padding: 12px; background: #3e2723; border: 1px solid var(--accent-color); 
    border-radius: 0; color: #fff; font-size: 16px; box-sizing: border-box; 
  }

  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
  .char-btn { 
    cursor: pointer; border: 1px solid #5d4037; aspect-ratio: 1/1; background: #3e2723; 
    display: flex; align-items: center; justify-content: center; color: #a1887f; font-size: 11px; text-align: center; 
  }
  .char-btn.selected { 
    border: 2px solid var(--accent-color); color: #fff; background: #5d4037; 
    box-shadow: inset 0 0 10px rgba(218, 165, 32, 0.5);
  }

  .color-btn { padding: 10px 12px; background: #3e2723; border: 1px solid #5d4037; color: #fff; cursor: pointer; font-size: 12px; }
  .color-btn.selected { background: var(--accent-color); color: #000; font-weight: bold; }

  .selection-stack label { display: flex; align-items: center; gap: 12px; background: #3e2723; padding: 12px; color: #fff; margin-bottom: 5px; border: 1px solid #5d4037; }

  button#generate-btn { 
    width: 100%; padding: 18px; background: var(--accent-color); color: #000; 
    border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
    text-transform: uppercase; letter-spacing: 2px;
  }
  button#generate-btn:hover { background: #ffca28; }

  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border: 5px solid var(--accent-color); }
</style>
</head>
<body>

  <h1>⚙ HISOUTENSOKU CHRONICLE GENERATOR ⚙</h1>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>探索者名 (PLAYER NAME)</label><input type="text" id="name" maxlength="15"></div>
      <div class="form-group"><label>階級 (RANK / RATE)</label><input type="text" id="rank" maxlength="20"></div>
      
      <div class="form-group">
        <label>主軸機体 (MAIN CHARACTER)</label>
        <div id="main-char-selector" class="char-grid"></div>
        <label style="margin-top: 15px;">識別色 (COLOR)</label>
        <div id="color-selector" class="color-chips" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
      </div>

      <div class="form-group"><label>補助機体 (SUB CHARACTERS)</label><div id="sub-char-selector" class="char-grid"></div></div>

      <div class="form-group">
        <label>行動指針 (STYLE)</label>
        <div class="selection-stack">
          <label><input type="radio" name="style" value="HARD-CORE" checked> 集中運用 (ガチ)</label>
          <label><input type="radio" name="style" value="ENJOY"> 汎用運用 (エンジョイ)</label>
        </div>
      </div>

      <div class="form-group">
        <label>通信設定 (HOST / CLIENT)</label>
        <div class="selection-stack">
          <label><input type="radio" name="side" value="HOST" checked> 発信側 (HOST)</label>
          <label><input type="radio" name="side" value="CLIENT"> 受信側 (CLIENT)</label>
          <label><input type="radio" name="side" value="BOTH"> 双方対応</label>
        </div>
      </div>

      <div class="form-group"><label>稼働時間帯</label><input type="text" id="time" maxlength="20"></div>
      <div class="form-group"><label>操作端末 (DEVICE)</label><input type="text" id="device" maxlength="20"></div>
      
      <div class="form-group">
        <label>外部補助機関 (TOOLS)</label>
        <div class="selection-stack">
          <label><input type="checkbox" id="tool-tenco" checked> Tenco</label>
          <label><input type="checkbox" id="tool-punch"> Punch</label>
          <label><input type="checkbox" id="tool-giu"> giu</label>
          <label><input type="checkbox" id="tool-socro"> socro</label>
        </div>
      </div>

      <div class="form-group"><label>得意・苦手構成</label><input type="text" id="matchup" maxlength="30"></div>
      <div class="form-group"><label>他関心事 (OTHER INTERESTS)</label><input type="text" id="other-games" maxlength="30"></div>
      <div class="form-group"><label>備考録 (COMMENT)</label><textarea id="comment" maxlength="100" rows="3"></textarea></div>

      <button type="button" id="generate-btn" onclick="generateCard()">記録を生成する</button>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="800"></canvas>
      <img id="final-image" alt="Profile Card" style="display:none;">
    </div>
  </div>

<script>
const charData = {"博麗 霊夢":"reimu","霧雨 魔理沙":"marisa","東風谷 早苗":"sanae","チルノ":"cirno","紅 美鈴":"meirin","十六夜 咲夜":"sakuya","アリス":"alice","伊吹 萃香":"suika","鈴仙":"reisen","射命丸 文":"aya","小野塚 小町":"komachi","永江 衣玖":"iku","比那名居 天子":"tenshi","パチュリー":"patche","西行寺 幽々子":"yuyuko","八雲 紫":"yukari","洩矢 諏訪子":"suwako","霊烏路 空":"utsuho","魂魄 妖夢":"youmu","レミリア":"remilia"};
let selectedMain = "博麗 霊夢", selectedSubs = [], selectedColor = "1";

window.onload = () => {
  const mS = document.getElementById('main-char-selector'), sS = document.getElementById('sub-char-selector');
  Object.keys(charData).forEach(name => {
    const mb = document.createElement('div'); mb.className='char-btn'; mb.innerHTML=`<span>${name.replace(' ','<br>')}</span>`;
    if(name===selectedMain) mb.classList.add('selected');
    mb.onclick=()=>{document.querySelectorAll('#main-char-selector .char-btn').forEach(e=>e.classList.remove('selected')); mb.classList.add('selected'); selectedMain=name;};
    mS.appendChild(mb);
    const sb = document.createElement('div'); sb.className='char-btn'; sb.innerHTML=`<span>${name.replace(' ','<br>')}</span>`;
    sb.onclick=()=>{if(selectedSubs.includes(name)){selectedSubs=selectedSubs.filter(n=>n!==name); sb.classList.remove('selected');}else{selectedSubs.push(name); sb.classList.add('selected');}};
    sS.appendChild(sb);
  });
  updateColorSelector();
};

function updateColorSelector() {
  const c = document.getElementById('color-selector'); c.innerHTML='';
  for(let i=1;i<=8;i++){
    const b=document.createElement('button'); b.className='color-btn'; if(i==selectedColor)b.classList.add('selected'); b.innerText=i+'P';
    b.onclick=(e)=>{e.preventDefault(); selectedColor=i; updateColorSelector();}; c.appendChild(b);
  }
}

function drawWrap(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  for (let n = 0; n < text.length; n++) {
    let testLine = line + text[n];
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = text[n]; y += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, y);
  return y;
}

function generateCard() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  
  // 背景（古びた金属/木目調）
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 800);
  // 二重枠線
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 760, 760);
  ctx.lineWidth = 1; ctx.strokeRect(30, 30, 740, 740);
  
  ctx.fillStyle = brass; ctx.font = 'bold 24px serif'; ctx.fillText('⚙ HISOUTENSOKU CHRONICLE ⚙', 50, 75);

  const drawLbl = (l, x, y) => { ctx.fillStyle = brass; ctx.font = 'bold 13px serif'; ctx.fillText(`【 ${l} 】`, x, y); };
  const drawDat = (d, x, y, f) => { ctx.fillStyle = '#fdf5e6'; ctx.font = f; ctx.fillText(d, x, y); };
  
  const name = document.getElementById('name').value || 'Unknown';
  const rank = document.getElementById('rank').value || '---';
  const subStr = selectedSubs.join(', ') || '---';
  const style = document.querySelector('input[name="style"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const time = document.getElementById('time').value || '---';
  const device = document.getElementById('device').value || '---';
  const matchup = document.getElementById('matchup').value || '---';
  const other = document.getElementById('other-games').value || '---';
  const comment = document.getElementById('comment').value || '---';
  const tools = [
    document.getElementById('tool-tenco').checked ? 'Tenco' : null,
    document.getElementById('tool-punch').checked ? 'Punch' : null,
    document.getElementById('tool-giu').checked ? 'giu' : null,
    document.getElementById('tool-socro').checked ? 'socro' : null
  ].filter(t => t).join(' / ') || 'None';

  drawLbl('PILOT NAME', 55, 130);
  drawDat(name, 55, 185, 'bold 46px serif');

  drawLbl('CURRENT RANK', 55, 230);
  drawDat(rank, 55, 260, 'bold 24px serif');

  drawLbl('PRIMARY UNIT', 55, 305);
  drawDat(`${selectedMain} (${selectedColor}P)`, 55, 335, 'bold 20px serif');

  drawLbl('SUPPORT UNITS', 55, 385);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 16px serif';
  let subBottomY = drawWrap(ctx, subStr, 55, 415, 380, 24);

  let nextY = subBottomY + 50;
  drawLbl('TACTICS / COMMS / TIME', 55, nextY);
  drawDat(`${style} / ${side} / ${time}`, 55, nextY + 30, 'bold 18px serif');

  drawLbl('EQUIPMENT / TOOLS', 55, nextY + 85);
  drawDat(`${device} [ ${tools} ]`, 55, nextY + 115, 'bold 17px serif');

  drawLbl('COMPATIBILITY', 460, 460);
  drawDat(matchup, 460, 490, 'bold 16px serif');

  drawLbl('EXTERNAL RECORDS', 460, 535);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 15px serif';
  drawWrap(ctx, other, 460, 565, 290, 22);

  drawLbl('LOGBOOK MEMO', 460, 625);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 14px serif';
  drawWrap(ctx, comment, 460, 655, 290, 20);

  const img = new Image(); const folder = charData[selectedMain];
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;
  img.onload = () => {
    // 画像の縁取りを真鍮風に
    ctx.strokeStyle = brass; ctx.lineWidth = 5; ctx.strokeRect(455, 85, 300, 350);
    ctx.drawImage(img, 460, 90, 290, 340);
    document.getElementById('final-image').src = canvas.toDataURL('image/png');
    document.getElementById('final-image').style.display = 'block';
  };
}
</script>
</body>
</html>
