<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールメーカー - STEAMPUNK</title>
<style>
  :root { 
    --bg-color: #2b1e16; 
    --text-color: #fdf5e6; 
    --accent-color: #daa520; 
    --border-color: #5d4037; 
    --card-width: 600px; 
  }
  body { 
    font-family: 'serif'; background-color: #1a0f0a; color: var(--text-color); 
    margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
  }
  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }
  #profile-form { 
    background-color: var(--bg-color); padding: 20px; border: 3px double var(--accent-color); 
    box-sizing: border-box; 
  }
  .form-group { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--accent-color); font-size: 0.85em; }
  input[type="text"], textarea { 
    width: 100%; padding: 10px; background: #3e2723; border: 1px solid var(--accent-color); 
    border-radius: 0; color: #fff; box-sizing: border-box; font-size: 16px;
  }
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .char-btn { 
    cursor: pointer; border: 1px solid #5d4037; aspect-ratio: 1/1; background: #3e2723; 
    display: flex; align-items: center; justify-content: center; font-size: 9px; text-align: center; line-height: 1.2;
    overflow: hidden; padding: 2px;
  }
  .char-btn.selected { border: 2px solid var(--accent-color); background: #5d4037; color: #fff; }
  
  .color-btn { padding: 8px 10px; background: #3e2723; border: 1px solid var(--accent-color); color: #fff; cursor: pointer; }
  .color-btn.selected { background: var(--accent-color); color: #000; font-weight: bold; }

  button#generate-btn { 
    width: 100%; padding: 15px; background: var(--accent-color); color: #000; 
    border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; font-size: 1.1rem;
  }
  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border: 4px solid var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

  <h1 style="color:var(--accent-color)">⚙ HISOUTENSOKU CHRONICLE ⚙</h1>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>探索者名</label><input type="text" id="name" maxlength="15"></div>
      <div class="form-group"><label>階級 / レート</label><input type="text" id="rank" maxlength="20"></div>
      
      <div class="form-group">
        <label>主軸機体 / 識別色</label>
        <div id="main-char-selector" class="char-grid"></div>
        <div id="color-selector" style="display:flex; gap:5px; margin-top:10px; flex-wrap: wrap;"></div>
      </div>

      <div class="form-group"><label>補助機体 (複数選択可)</label><div id="sub-char-selector" class="char-grid"></div></div>

      <div class="form-group"><label>行動指針</label>
        <label style="color:#fff;font-weight:normal"><input type="radio" name="style" value="HARD-CORE" checked> 集中運用 (ガチ)</label>
        <label style="color:#fff;font-weight:normal"><input type="radio" name="style" value="ENJOY"> 汎用運用 (エンジョイ)</label>
      </div>

      <div class="form-group"><label>通信設定</label>
        <label style="color:#fff;font-weight:normal"><input type="radio" name="side" value="HOST" checked> 発信側 (HOST)</label>
        <label style="color:#fff;font-weight:normal"><input type="radio" name="side" value="CLIENT"> 受信側 (CLIENT)</label>
      </div>

      <div class="form-group"><label>稼働時間帯</label><input type="text" id="time" maxlength="20"></div>
      <div class="form-group"><label>操作端末</label><input type="text" id="device" maxlength="20"></div>
      <div class="form-group"><label>得意・苦手</label><input type="text" id="matchup" maxlength="30"></div>
      <div class="form-group"><label>他関心事</label><input type="text" id="other-games" maxlength="30"></div>
      <div class="form-group"><label>備考録</label><textarea id="comment" maxlength="100" rows="3"></textarea></div>
      
      <button type="button" id="generate-btn" onclick="generateCard()">記録を生成する</button>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="800"></canvas>
      <img id="final-image" alt="Profile Card">
    </div>
  </div>

<script>
// 指定された順番にデータを整理
const charData = {
  "博麗 霊夢":"reimu","霧雨 魔理沙":"marisa","十六夜 咲夜":"sakuya",
  "アリス・マーガトロイド":"alice","パチュリー・ノーレッジ":"patche",
  "魂魄 妖夢":"youmu","レミリア・スカーレット":"remilia",
  "西行寺 幽々子":"yuyuko","八雲 紫":"yukari","伊吹 萃香":"suika",
  "鈴仙・優曇華院・イナバ":"reisen","射命丸 文":"aya","小野塚 小町":"komachi",
  "永江 衣玖":"iku","比那名居 天子":"tenshi","東風谷 早苗":"sanae",
  "チルノ":"cirno","紅 美鈴":"meirin","霊烏路 空":"utsuho","洩矢 諏訪子":"suwako"
};

let selectedMain = "博麗 霊夢", selectedSubs = [], selectedColor = "1";

window.onload = () => {
  const mS = document.getElementById('main-char-selector'), sS = document.getElementById('sub-char-selector');
  Object.keys(charData).forEach(name => {
    // ボタン表示用のテキスト整形（・で改行）
    const displayName = name.replace('・', '<br>').replace(' ', '<br>');
    
    const mb = document.createElement('div'); mb.className='char-btn'; mb.innerHTML=`<span>${displayName}</span>`;
    if(name===selectedMain) mb.classList.add('selected');
    mb.onclick=()=>{document.querySelectorAll('#main-char-selector .char-btn').forEach(e=>e.classList.remove('selected')); mb.classList.add('selected'); selectedMain=name;};
    mS.appendChild(mb);

    const sb = document.createElement('div'); sb.className='char-btn'; sb.innerHTML=`<span>${displayName}</span>`;
    sb.onclick=()=>{if(selectedSubs.includes(name)){selectedSubs=selectedSubs.filter(n=>n!==name); sb.classList.remove('selected');}else{selectedSubs.push(name); sb.classList.add('selected');}};
    sS.appendChild(sb);
  });
  updateColorSelector();
};

function updateColorSelector() {
  const c = document.getElementById('color-selector'); c.innerHTML='';
  for(let i=1;i<=8;i++){
    const b=document.createElement('button'); b.className='color-btn'; if(i==selectedColor)b.classList.add('selected'); b.innerText=i+'P';
    b.onclick=(e)=>{e.preventDefault(); selectedColor=i; updateColorSelector();}; c.appendChild(b);
  }
}

function drawWrap(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  for (let n = 0; n < text.length; n++) {
    let testLine = line + text[n];
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y); line = text[n]; y += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, y); return y;
}

function generateCard() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 800);
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 760, 760);
  ctx.lineWidth = 1; ctx.strokeRect(30, 30, 740, 740);
  
  ctx.fillStyle = brass; ctx.font = 'bold 24px serif'; ctx.fillText('⚙ HISOUTENSOKU CHRONICLE ⚙', 50, 75);

  const drawLbl = (l, x, y) => { ctx.fillStyle = brass; ctx.font = 'bold 13px serif'; ctx.fillText(`【 ${l} 】`, x, y); };
  const drawDat = (d, x, y, f) => { ctx.fillStyle = '#fdf5e6'; ctx.font = f; ctx.fillText(d, x, y); };
  
  const name = document.getElementById('name').value || '---';
  const rank = document.getElementById('rank').value || '---';
  const subStr = selectedSubs.join(', ') || '---';
  const style = document.querySelector('input[name="style"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const time = document.getElementById('time').value || '---';
  const device = document.getElementById('device').value || '---';
  const matchup = document.getElementById('matchup').value || '---';
  const other = document.getElementById('other-games').value || '---';
  const comment = document.getElementById('comment').value || '---';

  // --- 左側描画 ---
  drawLbl('PILOT NAME', 55, 130);
  drawDat(name, 55, 185, 'bold 46px serif');
  drawLbl('RANK', 55, 230);
  drawDat(rank, 55, 260, 'bold 24px serif');
  drawLbl('PRIMARY UNIT', 55, 305);
  drawDat(`${selectedMain} (${selectedColor}P)`, 55, 335, 'bold 20px serif');
  drawLbl('SUPPORT UNITS', 55, 385);
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 16px serif';
  let subBottomY = drawWrap(ctx, subStr, 55, 415, 380, 24);
  let nextY = subBottomY + 50;
  drawLbl('TACTICS / COMMS / TIME', 55, nextY);
  drawDat(`${style} / ${side} / ${time}`, 55, nextY + 30, 'bold 18px serif');
  drawLbl('DEVICE', 55, nextY + 85);
  drawDat(device, 55, nextY + 115, 'bold 17px serif');

  // 画像読み込み
  const img = new Image(); const folder = charData[selectedMain];
  // フォルダ名取得のため、フルネームから内部キーを取得（例: アリス・マーガトロイド -> alice）
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;
  
  img.onload = () => {
    const imgX = 460;
    const imgY = 90;
    
    // そのままのpixel数で出力
    ctx.drawImage(img, imgX, imgY);
    
    // 画像サイズに合わせた枠線
    ctx.strokeStyle = brass; ctx.lineWidth = 2;
    ctx.strokeRect(imgX - 2, imgY - 2, img.width + 4, img.height + 4);

    let rightNextY = imgY + img.height + 40;
    drawLbl('COMPATIBILITY', 460, rightNextY);
    drawDat(matchup, 460, rightNextY + 30, 'bold 16px serif');
    drawLbl('EXTERNAL RECORDS', 460, rightNextY + 75);
    ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 15px serif';
    drawWrap(ctx, other, 460, rightNextY + 105, 290, 22);
    drawLbl('LOGBOOK MEMO', 460, rightNextY + 165);
    ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 14px serif';
    drawWrap(ctx, comment, 460, rightNextY + 195, 290, 20);

    document.getElementById('final-image').src = canvas.toDataURL('image/png');
  };
}
</script>
</body>
</html>
