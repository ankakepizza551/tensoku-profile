<style>
  /* ...これまでのスタイルを維持しつつ、以下を調整... */
  
  .form-group { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }

  /* 1項目1段にするためのスタイル */
  .full-width-input {
    width: 100%;
    margin-bottom: 10px;
  }

  /* ラジオボタンやチェックボックスもゆったり配置 */
  .selection-row {
    display: flex;
    flex-direction: column; /* 縦に並べる */
    gap: 12px;
    margin-top: 10px;
  }
  
  .selection-row label {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #222;
    padding: 12px;
    border-radius: 6px;
    color: #fff;
    font-weight: normal;
  }
</style>

<form id="profile-form">
  <div class="form-group">
    <label>プレイヤー名</label>
    <input type="text" id="name" placeholder="Name" class="full-width-input">
  </div>

  <div class="form-group">
    <label>段位 / レート</label>
    <input type="text" id="rank" placeholder="例: Lunatic / 1650" class="full-width-input">
  </div>

  <div class="form-group">
    <label>メインキャラ選択</label>
    <div id="char-selector" class="char-grid"></div>
    <label style="margin-top: 15px;">カラー選択</label>
    <div id="color-selector" class="color-chips"></div>
  </div>

  <div class="form-group">
    <label>活動時間帯</label>
    <input type="text" id="time" placeholder="例: 平日22時〜" class="full-width-input">
  </div>

  <div class="form-group">
    <label>使用デバイス</label>
    <input type="text" id="device" placeholder="例: リアルアーケードPro" class="full-width-input">
  </div>

  <div class="form-group">
    <label>ホスト / クラ設定</label>
    <div class="selection-row">
      <label><input type="radio" name="side" value="ホスト派" checked> ホスト派</label>
      <label><input type="radio" name="side" value="クラ派"> クラ派</label>
      <label><input type="radio" name="side" value="両方可"> 両方可</label>
    </div>
  </div>

  <div class="form-group">
    <label>得意キャラ / 苦手キャラ</label>
    <input type="text" id="matchup" placeholder="得意: 霊夢 / 苦手: 萃香" class="full-width-input">
  </div>

  <div class="form-group">
    <label>天則以外のゲーム・趣味</label>
    <input type="text" id="other-games" placeholder="例: スト6、DTMなど" class="full-width-input">
  </div>

  <div class="form-group">
    <label>サブキャラ・一言コメント</label>
    <textarea id="comment" rows="3" placeholder="自由に入力してください" class="full-width-input"></textarea>
  </div>

  <button type="button" id="generate-btn" onclick="generateCard()">カードを生成する</button>
</form>
