<div class="container">
    <form id="profile-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="name" placeholder="例：レイちゃんさん" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>段位 / レート</label>
        <input type="text" id="rank" placeholder="例：Normal / 1500" oninput="updatePreview()">
      </div>
      
      <div class="form-group">
        <label>活動時間帯</label>
        <input type="text" id="time" placeholder="例：平日夜、休日" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>使用デバイス</label>
        <input type="text" id="device" placeholder="例：F310パッド、アケコン" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>得意キャラ・苦手キャラ</label>
        <input type="text" id="matchup" placeholder="例：得意：チルノ / 苦手：幽々子" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>天則以外の趣味</label>
        <input type="text" id="other-games" placeholder="例：動画視聴、音楽制作" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>一言コメント</label>
        <textarea id="comment" rows="3" placeholder="例：よろしくお願いします！" oninput="updatePreview()"></textarea>
      </div>
      
      </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="800"></canvas>
      <img id="final-image">
    </div>
</div>

<script>
// (中略: charList, window.onload, updateColorSelector, loadCharImage)

function updatePreview() {
  // キャンバスサイズを 800x800 に合わせて調整
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 800);
  
  // 背景装飾の枠線も高さ800に合わせて調整
  ctx.fillStyle = 'rgba(218, 165, 32, 0.08)';
  for(let i=0; i<800; i+=4) { for(let j=0; j<800; j+=4) { ctx.fillRect(i, j, 1, 1); } }
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 760, 760);

  const drawLbl = (l, x, y) => { ctx.fillStyle = brass; ctx.font = 'bold 13px serif'; ctx.fillText(`【 ${l} 】`, x, y); };
  const drawDat = (d, x, y, f) => { ctx.fillStyle = '#fdf5e6'; ctx.font = f; ctx.fillText(d || '---', x, y); };
  
  // ラベルの変更を反映
  drawLbl('PLAYER NAME', 55, 130);
  drawLbl('RANK / RATE', 55, 230);
  drawLbl('MAIN CHARACTER', 55, 305);
  drawLbl('SUB CHARACTERS', 55, 385); 
  
  // 下部の配置を少しずつ上に詰めて調整
  let subY = drawWrap(ctx, selectedSubs.join(', ') || '---', 55, 415, 380, 22);
  let nextY = subY + 40; 
  
  drawLbl('STYLE / TIME', 55, nextY);
  drawLbl('HOST / CLIENT', 55, nextY + 80);
  drawLbl('DEVICE', 55, nextY + 160);

  if(charImage.complete && charImage.naturalWidth !== 0) {
    ctx.drawImage(charImage, 460, 90);
    ctx.strokeStyle = brass; ctx.lineWidth = 2;
    ctx.strokeRect(458, 88, charImage.width + 4, charImage.height + 4);
  }
  
  let rightY = charImage.height > 300 ? 110 + charImage.height + 30 : 460;
  // ここも「得意キャラ・苦手キャラ」に変更
  drawLbl('得意キャラ・苦手キャラ', 460, rightY); 
  drawDat(document.getElementById('matchup').value, 460, rightY + 30, 'bold 16px serif');
  
  drawLbl('OTHER INTERESTS', 460, rightY + 75);
  let otherY = drawWrap(ctx, document.getElementById('other-games').value || '---', 460, rightY + 105, 290, 22);
  
  drawLbl('COMMENT', 460, otherY + 40);
  drawWrap(ctx, document.getElementById('comment').value || '---', 460, otherY + 70, 290, 20);

  document.getElementById('final-image').src = canvas.toDataURL('image/png');
}
// (以下略)
</script>
