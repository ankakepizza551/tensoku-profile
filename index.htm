<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールカードメーカー PRO</title>
<style>
  :root { --bg-color: #1a1a1a; --text-color: #e0e0e0; --accent-color: #00ff99; --border-color: #444; --card-width: 600px; }
  body { font-family: sans-serif; background-color: #121212; color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }
  #profile-form { background-color: var(--bg-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); box-sizing: border-box; }
  .form-group { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 20px; }
  label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  input[type="text"], textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border-color); border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box; }
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
  .char-btn { cursor: pointer; border: 1px solid #333; border-radius: 4px; aspect-ratio: 1/1; background: #222; display: flex; align-items: center; justify-content: center; color: #888; font-size: 11px; text-align: center; }
  .char-btn.selected { border-color: var(--accent-color); color: var(--accent-color); background: #000; box-shadow: inset 0 0 5px var(--accent-color); }
  .color-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .color-btn { padding: 10px 12px; background: #333; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; font-size: 12px; }
  .color-btn.selected { background: var(--accent-color); color: #000; font-weight: bold; }
  .selection-stack { display: flex; flex-direction: column; gap: 8px; }
  .selection-stack label { display: flex; align-items: center; gap: 12px; background: #262626; padding: 12px; border-radius: 8px; color: #fff; font-weight: normal; margin-bottom: 0; }
  button#generate-btn { width: 100%; padding: 18px; background: #000; color: var(--accent-color); border: 2px solid var(--accent-color); border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
</style>
</head>
<body>

  <h1>HISOUTENSOKU PROFILE GENERATOR</h1>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>プレイヤー名</label><input type="text" id="name" maxlength="15" placeholder="最大15文字"></div>
      <div class="form-group"><label>段位 / レート</label><input type="text" id="rank" maxlength="20" placeholder="最大20文字"></div>
      
      <div class="form-group">
        <label>メインキャラ選択</label>
        <div id="main-char-selector" class="char-grid"></div>
        <label style="margin-top: 15px;">カラー選択</label>
        <div id="color-selector" class="color-chips"></div>
      </div>

      <div class="form-group"><label>サブキャラ選択</label><div id="sub-char-selector" class="char-grid"></div></div>

      <div class="form-group">
        <label>プレイスタイル / ホスト・クラ</label>
        <div class="selection-stack">
          <label><input type="radio" name="style" value="ガチ勢" checked> ガチ勢</label>
          <label><input type="radio" name="style" value="エンジョイ"> エンジョイ</label>
          <hr style="width:100%; border:0; border-top:1px solid #444;">
          <label><input type="radio" name="side" value="ホスト派" checked> ホスト派</label>
          <label><input type="radio" name="side" value="クラ派"> クラ派</label>
          <label><input type="radio" name="side" value="両方可"> 両方可</label>
        </div>
      </div>

      <div class="form-group"><label>活動時間帯</label><input type="text" id="time" maxlength="20" placeholder="例: 平日22時〜"></div>
      <div class="form-group"><label>使用デバイス</label><input type="text" id="device" maxlength="20" placeholder="例: RAP"></div>
      
      <div class="form-group">
        <label>外部ツール</label>
        <div class="selection-stack">
          <label><input type="checkbox" id="tool-tenco" checked> Tenco</label>
          <label><input type="checkbox" id="tool-punch"> パンチ</label>
          <label><input type="checkbox" id="tool-giu"> giu</label>
          <label><input type="checkbox" id="tool-socro"> ソクロ</label>
        </div>
      </div>

      <div class="form-group"><label>得意・苦手</label><input type="text" id="matchup" maxlength="30" placeholder="最大30文字"></div>
      <div class="form-group"><label>天則以外の趣味</label><input type="text" id="other-games" maxlength="30" placeholder="最大30文字"></div>
      <div class="form-group"><label>一言コメント</label><textarea id="comment" maxlength="100" rows="3" placeholder="最大100文字"></textarea></div>

      <button type="button" id="generate-btn" onclick="generateCard()">カードを生成する</button>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="800"></canvas>
      <img id="final-image" alt="Profile Card" style="display:none;">
    </div>
  </div>

<script>
const charData = {"博麗 霊夢":"reimu","霧雨 魔理沙":"marisa","東風谷 早苗":"sanae","チルノ":"cirno","紅 美鈴":"meirin","十六夜 咲夜":"sakuya","アリス":"alice","伊吹 萃香":"suika","鈴仙":"reisen","射命丸 文":"aya","小野塚 小町":"komachi","永江 衣玖":"iku","比那名居 天子":"tenshi","パチュリー":"patche","西行寺 幽々子":"yuyuko","八雲 紫":"yukari","洩矢 諏訪子":"suwako","霊烏路 空":"utsuho","魂魄 妖夢":"youmu","レミリア":"remilia"};
let selectedMain = "博麗 霊夢", selectedSubs = [], selectedColor = "1";

window.onload = () => {
  const mS = document.getElementById('main-char-selector'), sS = document.getElementById('sub-char-selector');
  Object.keys(charData).forEach(name => {
    const mb = document.createElement('div'); mb.className='char-btn'; mb.innerHTML=`<span>${name.replace(' ','<br>')}</span>`;
    if(name===selectedMain) mb.classList.add('selected');
    mb.onclick=()=>{document.querySelectorAll('#main-char-selector .char-btn').forEach(e=>e.classList.remove('selected')); mb.classList.add('selected'); selectedMain=name;};
    mS.appendChild(mb);
    const sb = document.createElement('div'); sb.className='char-btn'; sb.innerHTML=`<span>${name.replace(' ','<br>')}</span>`;
    sb.onclick=()=>{if(selectedSubs.includes(name)){selectedSubs=selectedSubs.filter(n=>n!==name); sb.classList.remove('selected');}else{selectedSubs.push(name); sb.classList.add('selected');}};
    sS.appendChild(sb);
  });
  updateColorSelector();
};

function updateColorSelector() {
  const c = document.getElementById('color-selector'); c.innerHTML='';
  for(let i=1;i<=8;i++){
    const b=document.createElement('button'); b.className='color-btn'; if(i==selectedColor)b.classList.add('selected'); b.innerText=i+'P';
    b.onclick=(e)=>{e.preventDefault(); selectedColor=i; updateColorSelector();}; c.appendChild(b);
  }
}

function drawWrap(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  for (let n = 0; n < text.length; n++) {
    let testLine = line + text[n];
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = text[n]; y += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, y);
  return y;
}

function generateCard() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), accent = '#00ff99';
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, 800, 800);
  ctx.strokeStyle = accent; ctx.lineWidth = 3; ctx.strokeRect(15, 15, 770, 770);
  
  ctx.fillStyle = accent; ctx.font = 'bold 24px sans-serif'; ctx.fillText('■ HISOUTENSOKU PLAYER PROFILE ■', 45, 65);

  // ラベル描画関数（記号付き）
  const drawLbl = (l, x, y) => { ctx.fillStyle = accent; ctx.font = 'bold 13px sans-serif'; ctx.fillText(`■ ${l} ■`, x, y); };
  
  const name = document.getElementById('name').value || 'Nanashi';
  const rank = document.getElementById('rank').value || '-';
  const subStr = selectedSubs.join(', ') || 'なし';
  const style = document.querySelector('input[name="style"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const time = document.getElementById('time').value || '-';
  const device = document.getElementById('device').value || '-';
  const matchup = document.getElementById('matchup').value || '-';
  const other = document.getElementById('other-games').value || '-';
  const comment = document.getElementById('comment').value || '-';
  const tools = [
    document.getElementById('tool-tenco').checked ? 'Tenco' : null,
    document.getElementById('tool-punch').checked ? 'Punch' : null,
    document.getElementById('tool-giu').checked ? 'giu' : null,
    document.getElementById('tool-socro').checked ? 'socro' : null
  ].filter(t => t).join(' / ') || 'None';

  // アウトプットを白文字に統一
  ctx.fillStyle = '#fff';

  drawLbl('PLAYER NAME', 50, 130);
  ctx.font = 'bold 44px sans-serif'; ctx.fillText(name, 50, 180);

  drawLbl('RANK / RATE', 50, 225);
  ctx.font = 'bold 24px sans-serif'; ctx.fillText(rank, 50, 255);

  drawLbl('MAIN CHARACTER', 50, 300);
  ctx.font = 'bold 20px sans-serif'; ctx.fillText(`${selectedMain} (${selectedColor}P)`, 50, 330);

  drawLbl('SUB CHARACTERS', 50, 375);
  ctx.font = 'bold 16px sans-serif';
  let subBottomY = drawWrap(ctx, subStr, 50, 405, 380, 24);

  let nextY = subBottomY + 50;
  drawLbl('STYLE / SIDE / TIME', 50, nextY);
  ctx.font = 'bold 18px sans-serif'; ctx.fillText(`${style} / ${side} / ${time}`, 50, nextY + 30);

  drawLbl('DEVICE / TOOLS', 50, nextY + 85);
  ctx.fillText(`${device} [ ${tools} ]`, 50, nextY + 115);

  drawLbl('MATCHUP', 460, 460);
  ctx.font = 'bold 16px sans-serif'; ctx.fillText(matchup, 460, 490);

  drawLbl('OTHER INTERESTS', 460, 535);
  drawWrap(ctx, other, 460, 565, 290, 22);

  drawLbl('COMMENT', 460, 625);
  drawWrap(ctx, comment, 460, 655, 290, 20);

  const img = new Image(); const folder = charData[selectedMain];
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;
  img.onload = () => {
    ctx.shadowBlur = 25; ctx.shadowColor = accent;
    ctx.drawImage(img, 460, 90, 290, 340);
    ctx.shadowBlur = 0;
    document.getElementById('final-image').src = canvas.toDataURL('image/png');
    document.getElementById('final-image').style.display = 'block';
  };
}
</script>
</body>
</html>
