<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg-color: #2b1e16; 
    --text-color: #fdf5e6; 
    --accent-color: #daa520; 
    --border-color: #5d4037; 
  }
  body { 
    font-family: 'Noto Serif JP', serif; 
    background-color: #1a0f0a; 
    color: var(--text-color); 
    margin: 0; 
    padding: 10px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
  }
  .container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 20px; }
  
  .main-title { 
    text-align: center; 
    margin: 30px 0; 
    font-family: 'Oswald', sans-serif; 
    color: var(--accent-color);
  }

  #profile-form { background-color: var(--bg-color); padding: 25px; border: 3px double var(--accent-color); }
  .form-group { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
  label { display: block; margin-bottom: 12px; font-weight: bold; color: var(--accent-color); font-size: 0.85em; }
  
  input[type="text"], textarea { 
    width: 100%; padding: 10px; background: #1a0f0a; border: 1px solid var(--border-color); color: #fff; box-sizing: border-box; font-size: 16px;
  }

  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
  .char-btn { 
    cursor: pointer; border: 2px solid var(--border-color); background: #3e2723; 
    position: relative; aspect-ratio: 1 / 1; overflow: hidden; transition: 0.1s;
  }
  .char-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .char-btn.selected { border: 3px solid var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }

  .random-btn-wide { grid-column: span 5; height: 50px; margin-top: 5px; }

  .disabled-ui { pointer-events: none; opacity: 0.4; filter: grayscale(1); }

  .color-container { display: flex; flex-wrap: nowrap; gap: 2px; margin-top: 10px; width: 100%; }
  .color-btn { 
    flex: 1; padding: 8px 0; background: #3e2723; border: 1px solid var(--border-color); 
    color: #fff; cursor: pointer; font-size: 12px; text-align: center;
  }
  .color-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }

  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  #generate-btn { flex: 1; padding: 15px; background: var(--accent-color); font-weight: bold; cursor: pointer; border: none; }
  #download-btn { flex: 1; padding: 15px; background: #5d4037; color: white; font-weight: bold; cursor: pointer; border: 1px solid var(--accent-color); }

  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border: 4px solid var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

  <div class="main-title">
    <div style="font-size: 2.8rem; font-weight: 700;">⚙ HISOUTENSOKU ⚙</div>
    <div style="font-size: 1.4rem; letter-spacing: 6px; margin-top: 5px;">PROFILE GENERATOR</div>
  </div>

  <div class="container">
    <form id="profile-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="name" placeholder="例：無名のプレイヤー" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>段位 / レート</label>
        <input type="text" id="rank" placeholder="例：Normal / 1500" oninput="updatePreview()">
      </div>
      
      <div class="form-group">
        <label>メインキャラ / カラー選択</label>
        <div id="main-char-selector" class="char-grid"></div>
        <div id="color-selector" class="color-container"></div>
      </div>

      <div class="form-group">
        <label>サブキャラ選択 (複数可)</label>
        <div id="sub-char-selector" class="char-grid"></div>
      </div>

      <div class="form-group">
        <label>プレイスタイル</label>
        <div style="font-size: 0.9em;">
          <input type="radio" name="style" value="ガチ勢" checked onchange="updatePreview()"> ガチ勢
          <input type="radio" name="style" value="エンジョイ勢" onchange="updatePreview()"> エンジョイ勢
        </div>
      </div>

      <div class="form-group">
        <label>通信設定</label>
        <div style="display: flex; gap: 20px;">
          <div>ホスト：<input type="radio" name="host" value="可" checked onchange="updatePreview()"> 可 <input type="radio" name="host" value="不可" onchange="updatePreview()"> 不可</div>
          <div>クライアント：<input type="radio" name="client" value="可" checked onchange="updatePreview()"> 可 <input type="radio" name="client" value="不可" onchange="updatePreview()"> 不可</div>
        </div>
      </div>

      <div class="form-group">
        <label>活動時間帯</label>
        <input type="text" id="time" placeholder="例：平日 21:00〜24:00" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>使用デバイス</label>
        <input type="text" id="device" placeholder="例：F310、キーボード、アケコン等" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>得意キャラ・苦手キャラ</label>
        <input type="text" id="matchup" placeholder="例：得意：霊夢 / 苦手：早苗" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>天則以外の趣味</label>
        <input type="text" id="other-games" placeholder="例：他ゲーム、音楽制作等" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>一言コメント</label>
        <textarea id="comment" rows="3" placeholder="何かあれば" oninput="updatePreview()"></textarea>
      </div>
      
      <div class="btn-group">
        <button type="button" id="generate-btn" onclick="updatePreview()">再描画</button>
        <button type="button" id="download-btn" onclick="downloadImage()">画像として保存</button>
      </div>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="800"></canvas>
      <img id="final-image" alt="プロフィールプレビュー">
    </div>
  </div>

<script>
const pngPath = "./image/ProfileSelectPNG/";
const charList = [
  { name: "博麗霊夢", id: "reimu", file: "Select_01Reimu.png" },
  { name: "霧雨魔理沙", id: "marisa", file: "Select_02Marisa.png" },
  { name: "十六夜咲夜", id: "sakuya", file: "Select_03Sakuya.png" },
  { name: "アリス", id: "alice", file: "Select_04Alice.png" },
  { name: "パチュリー", id: "patchouli", file: "Select_05Patchouli.png" }, // idをpatchouliに統一
  { name: "魂魄妖夢", id: "youmu", file: "Select_06Youmu.png" },
  { name: "レミリア", id: "remilia", file: "Select_07Remilia.png" },
  { name: "西行寺幽々子", id: "yuyuko", file: "Select_08Yuyuko.png" },
  { name: "八雲紫", id: "yukari", file: "Select_09Yukari.png" },
  { name: "伊吹萃香", id: "suika", file: "Select_10Suika.png" },
  { name: "鈴仙", id: "reisen", file: "Select_11Udonge.png" },
  { name: "射命丸文", id: "aya", file: "Select_12Aya.png" },
  { name: "小野塚小町", id: "komachi", file: "Select_13Komachi.png" },
  { name: "永江衣玖", id: "iku", file: "Select_14Iku.png" },
  { name: "比那名居天子", id: "tenshi", file: "Select_15Tenshi.png" },
  { name: "東風谷早苗", id: "sanae", file: "Select_16Sanae.png" },
  { name: "チルノ", id: "cirno", file: "Select_17Chirno.png" },
  { name: "紅美鈴", id: "meirin", file: "Select_18Meirin.png" },
  { name: "霊烏路空", id: "utsuho", file: "Select_19Utsuho.png" },
  { name: "洩矢諏訪子", id: "suwako", file: "Select_20Suwako.png" }
];

let selectedMain = charList[0], selectedSubs = [], selectedColor = "1";
let charImage = new Image();

window.onload = () => {
  const mS = document.getElementById('main-char-selector'), sS = document.getElementById('sub-char-selector');
  
  charList.forEach(char => {
    // メイン選択
    const mb = document.createElement('div'); mb.className = 'char-btn';
    const mImg = document.createElement('img'); mImg.src = pngPath + char.file;
    mb.appendChild(mImg);
    if(char.name === selectedMain.name) mb.classList.add('selected');
    mb.onclick = () => {
      document.querySelectorAll('#main-char-selector .char-btn').forEach(e => e.classList.remove('selected'));
      mb.classList.add('selected'); selectedMain = char; loadCharImage();
    };
    mS.appendChild(mb);

    // サブ選択
    const sb = document.createElement('div'); sb.className = 'char-btn';
    const sImg = document.createElement('img'); sImg.src = pngPath + char.file;
    sb.appendChild(sImg);
    sb.onclick = () => {
      if(selectedSubs.includes(char.name)){
        selectedSubs = selectedSubs.filter(n => n !== char.name);
        sb.classList.remove('selected');
      } else {
        selectedSubs.push(char.name);
        sb.classList.add('selected');
      }
      updatePreview();
    };
    sS.appendChild(sb);
  });

  // ランダムボタン
  const rb = document.createElement('div');
  rb.className = 'char-btn random-btn-wide';
  rb.innerHTML = '<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; color:var(--accent-color); background:#1a0f0a; border:1px solid var(--border-color);">？ RANDOM ？</div>';
  rb.onclick = () => {
    document.querySelectorAll('#main-char-selector .char-btn').forEach(e => e.classList.remove('selected'));
    rb.classList.add('selected');
    selectedMain = { name: "ランダム", id: "random" };
    loadCharImage();
  };
  mS.appendChild(rb);

  updateColorSelector();
  loadCharImage();
};

function updateColorSelector() {
  const container = document.getElementById('color-selector');
  container.innerHTML = '';
  for(let i=1; i<=8; i++) {
    const b = document.createElement('button');
    b.className = 'color-btn' + (i == selectedColor ? ' active' : '');
    b.innerText = i + 'P';
    b.onclick = (e) => { e.preventDefault(); selectedColor = i; updateColorSelector(); loadCharImage(); };
    container.appendChild(b);
  }
}

function loadCharImage() {
  const colorUI = document.getElementById('color-selector');
  const subUI = document.getElementById('sub-char-selector');
  if (selectedMain.id === "random") {
    colorUI.classList.add('disabled-ui');
    subUI.classList.add('disabled-ui');
    selectedSubs = [];
    document.querySelectorAll('#sub-char-selector .char-btn').forEach(e => e.classList.remove('selected'));
    updatePreview();
  } else {
    colorUI.classList.remove('disabled-ui');
    subUI.classList.remove('disabled-ui');
    
    // 全キャラ共通で .jpg を使用（パチュリーも patchouli-1p.jpg などに合わせる）
    const ext = 'jpg';
    const targetSrc = `./image/${selectedMain.id}/${selectedMain.id}-${selectedColor}p.${ext}`;
    
    // 無限リロード防止
    charImage.onload = () => updatePreview();
    charImage.onerror = () => { 
        console.warn("画像読み込み失敗:", targetSrc);
        charImage.onerror = null; 
        charImage.src = `./image/${selectedMain.id}/${selectedMain.id}-1p.${ext}`; 
    };
    charImage.src = targetSrc;
  }
}

function drawWrap(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  for (let n = 0; n < text.length; n++) {
    let testLine = line + text[n];
    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y); line = text[n]; y += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, y); return y;
}

function updatePreview() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 800);
  
  ctx.fillStyle = 'rgba(218, 165, 32, 0.08)';
  for(let i=0; i<800; i+=4) { for(let j=0; j<800; j+=4) { ctx.fillRect(i, j, 1, 1); } }
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 760, 760);

  const drawLbl = (l, x, y) => { ctx.fillStyle = brass; ctx.font = 'bold 13px serif'; ctx.fillText(`【 ${l} 】`, x, y); };
  const drawDat = (d, x, y, f) => { ctx.fillStyle = '#fdf5e6'; ctx.font = f; ctx.fillText(d || '---', x, y); };
  
  const name = document.getElementById('name').value;
  const rank = document.getElementById('rank').value;
  const style = document.querySelector('input[name="style"]:checked').value;
  const hS = document.querySelector('input[name="host"]:checked').value;
  const cS = document.querySelector('input[name="client"]:checked').value;

  ctx.font = 'bold 24px Oswald';
  ctx.lineWidth = 5; ctx.strokeStyle = '#000';
  ctx.strokeText('⚙ HISOUTENSOKU PROFILE ⚙', 50, 75);
  ctx.fillStyle = brass; ctx.fillText('⚙ HISOUTENSOKU PROFILE ⚙', 50, 75);

  drawLbl('PLAYER NAME', 55, 130); drawDat(name, 55, 185, 'bold 44px serif');
  drawLbl('RANK / RATE', 55, 230); drawDat(rank, 55, 260, 'bold 24px serif');
  drawLbl('MAIN CHARACTER', 55, 305); drawDat(selectedMain.id === "random" ? "ランダム" : `${selectedMain.name} (${selectedColor}P)`, 55, 335, 'bold 20px serif');
  
  drawLbl('SUB CHARACTERS', 55, 385); 
  ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 15px serif';
  let subY = drawWrap(ctx, selectedSubs.join(', ') || '---', 55, 415, 380, 22);
  
  let nextY = subY + 40;
  drawLbl('STYLE / TIME', 55, nextY); drawDat(`${style} / ${document.getElementById('time').value}`, 55, nextY + 30, 'bold 18px serif');
  drawLbl('HOST / CLIENT', 55, nextY + 85); drawDat(`ホスト: ${hS} / クライアント: ${cS}`, 55, nextY + 115, 'bold 18px serif');
  drawLbl('DEVICE', 55, nextY + 170); drawDat(document.getElementById('device').value, 55, nextY + 200, 'bold 17px serif');

  if (selectedMain.id === "random") {
    ctx.fillStyle = '#1a0f0a'; ctx.fillRect(460, 90, 300, 400); 
    ctx.strokeStyle = brass; ctx.lineWidth = 2; ctx.strokeRect(458, 88, 304, 404);
    ctx.fillStyle = brass; ctx.font = 'bold 150px serif'; ctx.textAlign = 'center';
    ctx.fillText('？', 460 + 150, 90 + 260); ctx.textAlign = 'left';
  } else if(charImage.complete && charImage.naturalWidth !== 0) {
    ctx.drawImage(charImage, 460, 90);
    ctx.strokeStyle = brass; ctx.lineWidth = 2;
    ctx.strokeRect(458, 88, charImage.width + 4, charImage.height + 4);
  }
  
  let rightY = 460;
  drawLbl('MATCHUP (PROS/CONS)', 460, rightY); drawDat(document.getElementById('matchup').value, 460, rightY + 30, 'bold 16px serif');
  drawLbl('OTHER INTERESTS', 460, rightY + 75); ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 15px serif';
  let otherY = drawWrap(ctx, document.getElementById('other-games').value || '---', 460, rightY + 105, 290, 22);
  drawLbl('COMMENT', 460, otherY + 40); ctx.fillStyle = '#fdf5e6'; ctx.font = 'bold 14px serif';
  drawWrap(ctx, document.getElementById('comment').value || '---', 460, otherY + 70, 290, 20);

  document.getElementById('final-image').src = canvas.toDataURL('image/png');
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `Profile_${document.getElementById('name').value || 'th123'}.png`;
  link.href = document.getElementById('final-image').src;
  link.click();
}
</script>
</body>
</html>
