<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールカードメーカー PRO</title>
<style>
  :root {
    --bg-color: #1a1a1a;
    --text-color: #e0e0e0;
    --accent-color: #00ff99;
    --border-color: #444;
    --card-width: 600px;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: #121212;
    color: var(--text-color);
    margin: 0; padding: 10px;
    display: flex; flex-direction: column; align-items: center;
  }

  h1 { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); font-size: 1.2rem; margin-bottom: 20px; }

  .container { width: 100%; max-width: var(--card-width); display: flex; flex-direction: column; gap: 20px; }

  #profile-form {
    background-color: var(--bg-color);
    padding: 20px; border-radius: 12px;
    border: 1px solid var(--border-color);
    box-sizing: border-box;
  }

  .form-group { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 20px; }
  label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
  
  input[type="text"], textarea {
    width: 100%; padding: 12px; background: #000; border: 1px solid var(--border-color);
    border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box;
  }

  .char-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px;
  }

  .char-btn {
    cursor: pointer; border: 1px solid #333; border-radius: 4px; aspect-ratio: 1/1;
    background: #222; display: flex; align-items: center; justify-content: center;
    transition: 0.2s; color: #888; font-size: 11px; text-align: center; line-height: 1.2;
    padding: 2px;
  }

  @media (min-width: 480px) {
    .char-btn { font-size: 14px; font-weight: bold; }
  }

  .char-btn.selected { 
    border-color: var(--accent-color); 
    color: var(--accent-color); 
    background: #000; 
    box-shadow: inset 0 0 5px var(--accent-color); 
  }

  .color-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .color-btn {
    padding: 10px 12px; background: #333; border: 1px solid #555; color: #fff;
    cursor: pointer; border-radius: 4px; font-size: 12px;
  }
  .color-btn.selected { background: var(--accent-color); color: #000; font-weight: bold; }

  .selection-stack { display: flex; flex-direction: column; gap: 8px; }
  .selection-stack label {
    display: flex; align-items: center; gap: 12px; background: #262626;
    padding: 12px; border-radius: 8px; color: #fff; font-weight: normal; margin-bottom: 0;
  }

  button#generate-btn {
    width: 100%; padding: 18px; background: #000; color: var(--accent-color);
    border: 2px solid var(--accent-color); border-radius: 8px;
    font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
  }
  button#generate-btn:hover { background: var(--accent-color); color: #000; }

  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
</style>
</head>
<body>

  <h1>HISOUTENSOKU PROFILE GENERATOR PRO</h1>

  <div class="container">
    <form id="profile-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="name" placeholder="Name">
      </div>

      <div class="form-group">
        <label>段位 / レート</label>
        <input type="text" id="rank" placeholder="例: Lunatic / 1650">
      </div>

      <div class="form-group">
        <label>メインキャラ選択</label>
        <div id="main-char-selector" class="char-grid"></div>
        <label style="margin-top: 15px;">カラー選択</label>
        <div id="color-selector" class="color-chips"></div>
      </div>

      <div class="form-group">
        <label>サブキャラ選択（複数回答可）</label>
        <div id="sub-char-selector" class="char-grid"></div>
      </div>

      <div class="form-group">
        <label>プレイスタイル</label>
        <div class="selection-stack">
          <label><input type="radio" name="style" value="ガチ勢" checked> ガチ勢</label>
          <label><input type="radio" name="style" value="エンジョイ"> エンジョイ</label>
        </div>
      </div>

      <div class="form-group">
        <label>ホスト / クラ設定</label>
        <div class="selection-stack">
          <label><input type="radio" name="side" value="ホスト派" checked> ホスト派</label>
          <label><input type="radio" name="side" value="クラ派"> クラ派</label>
          <label><input type="radio" name="side" value="両方可"> 両方可</label>
        </div>
      </div>

      <div class="form-group">
        <label>活動時間帯</label>
        <input type="text" id="time" placeholder="例: 平日22時〜">
      </div>

      <div class="form-group">
        <label>使用デバイス</label>
        <input type="text" id="device" placeholder="例: リアルアーケードPro">
      </div>

      <div class="form-group">
        <label>外部ツール</label>
        <div class="selection-stack">
          <label><input type="checkbox" id="tool-tenco" checked> Tenco</label>
          <label><input type="checkbox" id="tool-punch"> パンチ</label>
          <label><input type="checkbox" id="tool-giu"> giu</label>
          <label><input type="checkbox" id="tool-socro"> ソクロ</label>
        </div>
      </div>

      <div class="form-group">
        <label>得意キャラ / 苦手キャラ</label>
        <input type="text" id="matchup" placeholder="得意: 霊夢 / 苦手: 萃香">
      </div>

      <div class="form-group">
        <label>天則以外のゲーム・趣味</label>
        <input type="text" id="other-games" placeholder="例: スト6、DTMなど">
      </div>

      <div class="form-group">
        <label>一言コメント</label>
        <textarea id="comment" rows="3" placeholder="自由に入力してください"></textarea>
      </div>

      <button type="button" id="generate-btn" onclick="generateCard()">カードを生成する</button>
    </form>

    <div id="output-area">
      <canvas id="card-canvas" width="800" height="600"></canvas>
      <img id="final-image" alt="Profile Card" style="display:none;">
      <p style="color: #888; font-size: 0.8em; margin-top: 10px;">画像を長押しして保存してね</p>
    </div>
  </div>

<script>
const charData = {
  "博麗 霊夢": "reimu", "霧雨 魔理沙": "marisa", "東風谷 早苗": "sanae", "チルノ": "cirno", 
  "紅 美鈴": "meirin", "十六夜 咲夜": "sakuya", "アリス": "alice", "伊吹 萃香": "suika", 
  "鈴仙": "reisen", "射命丸 文": "aya", "小野塚 小町": "komachi", "永江 衣玖": "iku", 
  "比那名居 天子": "tenshi", "パチュリー": "patche", "西行寺 幽々子": "yuyuko", 
  "八雲 紫": "yukari", "洩矢 諏訪子": "suwako", "霊烏路 空": "utsuho", 
  "魂魄 妖夢": "youmu", "レミリア": "remilia"
};

let selectedMain = "博麗 霊夢";
let selectedSubs = [];
let selectedColor = "1";

window.onload = () => {
  const mainSelector = document.getElementById('main-char-selector');
  const subSelector = document.getElementById('sub-char-selector');

  Object.keys(charData).forEach(name => {
    const mBtn = document.createElement('div');
    mBtn.className = 'char-btn';
    if(name === selectedMain) mBtn.classList.add('selected');
    mBtn.innerHTML = `<span>${name.replace(' ', '<br>')}</span>`;
    mBtn.onclick = () => {
      document.querySelectorAll('#main-char-selector .char-btn').forEach(el => el.classList.remove('selected'));
      mBtn.classList.add('selected');
      selectedMain = name;
    };
    mainSelector.appendChild(mBtn);

    const sBtn = document.createElement('div');
    sBtn.className = 'char-btn';
    sBtn.innerHTML = `<span>${name.replace(' ', '<br>')}</span>`;
    sBtn.onclick = () => {
      if(selectedSubs.includes(name)) {
        selectedSubs = selectedSubs.filter(n => n !== name);
        sBtn.classList.remove('selected');
      } else {
        selectedSubs.push(name);
        sBtn.classList.add('selected');
      }
    };
    subSelector.appendChild(sBtn);
  });
  updateColorSelector();
};

function updateColorSelector() {
  const container = document.getElementById('color-selector');
  container.innerHTML = '';
  for(let i=1; i<=8; i++) {
    const btn = document.createElement('button');
    btn.className = 'color-btn';
    if(i == selectedColor) btn.classList.add('selected');
    btn.innerText = i + 'P';
    btn.onclick = (e) => {
      e.preventDefault();
      selectedColor = i;
      updateColorSelector();
    };
    container.appendChild(btn);
  }
}

// テキスト折り返し描画用ヘルパー
function drawTextWithWrap(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  let currentY = y;
  for (let n = 0; n < text.length; n++) {
    let testLine = line + text[n];
    let metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, currentY);
      line = text[n];
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, currentY);
}

function generateCard() {
  const canvas = document.getElementById('card-canvas');
  const ctx = canvas.getContext('2d');
  const accent = '#00ff99';

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 800, 600);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 3;
  ctx.strokeRect(15, 15, 770, 570);

  ctx.fillStyle = accent;
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('HISOUTENSOKU PLAYER PROFILE', 45, 60);

  function drawLabel(label, x, y) {
    ctx.fillStyle = accent;
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText(label, x, y);
  }

  const name = document.getElementById('name').value || 'Nanashi';
  const rank = document.getElementById('rank').value || '-';
  const subStr = selectedSubs.join(', ') || 'なし';
  const style = document.querySelector('input[name="style"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const time = document.getElementById('time').value || '-';
  const device = document.getElementById('device').value || '-';
  const matchup = document.getElementById('matchup').value || '-';
  const other = document.getElementById('other-games').value || '-';
  const comment = document.getElementById('comment').value || '-';
  const tools = [
    document.getElementById('tool-tenco').checked ? 'Tenco' : null,
    document.getElementById('tool-punch').checked ? 'Punch' : null,
    document.getElementById('tool-giu').checked ? 'giu' : null,
    document.getElementById('tool-socro').checked ? 'socro' : null
  ].filter(t => t).join(' / ') || 'None';

  // 左カラム描画
  drawLabel('PLAYER NAME', 50, 105);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillText(name, 50, 140);

  drawLabel('RANK / RATE', 50, 185);
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText(rank, 50, 213);

  drawLabel('MAIN CHARACTER', 50, 245);
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(`${selectedMain} (${selectedColor}P)`, 50, 273);

  drawLabel('SUB CHARACTERS', 50, 305);
  ctx.font = 'bold 16px sans-serif';
  drawTextWithWrap(ctx, subStr, 50, 330, 380, 22);

  drawLabel('STYLE / SIDE', 50, 385);
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(`${style} / ${side}`, 50, 413);

  drawLabel('ACTIVITY TIME', 50, 445);
  ctx.fillText(time, 50, 473);

  drawLabel('DEVICE / TOOLS', 50, 505);
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText(`${device} [ ${tools} ]`, 50, 533);

  drawLabel('MATCHUP', 50, 565);
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText(matchup, 130, 565);

  // 右カラム描画
  drawLabel('OTHER INTERESTS', 460, 465);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  drawTextWithWrap(ctx, other, 460, 490, 290, 22);

  drawLabel('COMMENT', 460, 540);
  ctx.fillStyle = '#bbb';
  ctx.font = 'bold 15px sans-serif';
  drawTextWithWrap(ctx, comment, 460, 565, 290, 20);

  const img = new Image();
  const folder = charData[selectedMain];
  img.src = `./image/${folder}/${folder}-${selectedColor}p.jpg`;

  img.onload = () => {
    ctx.shadowBlur = 25; ctx.shadowColor = accent;
    ctx.drawImage(img, 460, 85, 290, 340);
    ctx.shadowBlur = 0;
    finalize();
  };
  img.onerror = () => {
    ctx.fillStyle = '#222'; ctx.fillRect(460, 85, 290, 340);
    finalize();
  };

  function finalize() {
    const finalImg = document.getElementById('final-image');
    finalImg.src = canvas.toDataURL('image/png');
    finalImg.style.display = 'block';
  }
}
</script>
</body>
</html>
