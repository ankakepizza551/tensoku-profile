<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非想天則 プロフィールメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg-color: #2b1e16; 
    --text-color: #fdf5e6; 
    --accent-color: #daa520; 
    --border-color: #5d4037; 
  }
  body { 
    font-family: sans-serif; background-color: #1a0f0a; color: var(--text-color); 
    margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
  }
  .container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 20px; }
  
  .main-title { 
    text-align: center; margin: 30px 0; 
    font-family: 'Oswald', sans-serif; color: var(--accent-color);
    text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 5px 10px rgba(0,0,0,.25);
  }

  #profile-form { background-color: var(--bg-color); padding: 25px; border: 3px double var(--accent-color); }
  .form-group { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
  label { display: block; margin-bottom: 12px; font-weight: bold; color: var(--accent-color); font-size: 0.85em; }
  
  input[type="text"], textarea { 
    width: 100%; padding: 10px; background: #1a0f0a; border: 1px solid var(--border-color); color: #fff; box-sizing: border-box; font-size: 16px;
  }

  /* キャラクター選択画像ボタン */
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
  .char-btn { 
    cursor: pointer; border: 2px solid var(--border-color); background: #3e2723; 
    position: relative; aspect-ratio: 1 / 1; overflow: hidden; transition: 0.1s;
  }
  .char-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .char-btn:hover { transform: scale(1.05); }
  .char-btn.selected { border: 3px solid var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
  .char-btn::after {
    content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 8px; text-align: center;
    opacity: 0; transition: 0.2s;
  }
  .char-btn:hover::after, .char-btn.selected::after { opacity: 1; }

  .connection-settings { display: flex; flex-direction: column; gap: 10px; }
  .connection-row { display: flex; align-items: center; font-size: 0.9em; }
  .connection-row span { width: 80px; font-weight: bold; color: var(--accent-color); }
  
  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  #generate-btn { flex: 2; padding: 15px; background: var(--accent-color); font-weight: bold; cursor: pointer; border: none; font-family: 'Oswald', sans-serif; }
  #download-btn { flex: 1; padding: 15px; background: #5d4037; color: white; font-weight: bold; cursor: pointer; border: 1px solid var(--accent-color); }

  #output-area { width: 100%; margin-top: 20px; text-align: center; }
  #card-canvas { display: none; }
  #final-image { width: 100%; border: 4px solid var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

  <div class="main-title">
    <div style="font-size: 2.2rem; font-weight: 700;">⚙ HISOUTENSOKU ⚙</div>
    <div style="font-size: 1.2rem; letter-spacing: 4px;">PROFILE GENERATOR</div>
  </div>

  <div class="container">
    <form id="profile-form">
      <div class="form-group"><label>プレイヤー名</label><input type="text" id="name" placeholder="博麗 霊夢" oninput="updatePreview()"></div>
      <div class="form-group"><label>段位 / レート</label><input type="text" id="rank" placeholder="LUNATIC" oninput="updatePreview()"></div>
      
      <div class="form-group"><label>メインキャラ選択</label><div id="main-char-selector" class="char-grid"></div></div>
      <div class="form-group"><label>サブキャラ選択 (複数可)</label><div id="sub-char-selector" class="char-grid"></div></div>

      <div class="form-group">
        <label>通信設定</label>
        <div class="connection-settings">
          <div class="connection-row">
            <span>ホスト：</span>
            <input type="radio" name="host" value="可" checked onchange="updatePreview()"> 可
            <input type="radio" name="host" value="不可" onchange="updatePreview()" style="margin-left: 15px;"> 不不可
          </div>
          <div class="connection-row">
            <span>クラ：</span>
            <input type="radio" name="client" value="可" checked onchange="updatePreview()"> 可
            <input type="radio" name="client" value="不可" onchange="updatePreview()" style="margin-left: 15px;"> 不可
          </div>
        </div>
      </div>

      <div class="form-group"><label>活動時間帯</label><input type="text" id="time" placeholder="21:00〜" oninput="updatePreview()"></div>
      <div class="form-group"><label>一言コメント</label><textarea id="comment" rows="3" oninput="updatePreview()"></textarea></div>
      
      <div class="btn-group">
        <button type="button" id="generate-btn" onclick="updatePreview()">再描画 (REDRAW)</button>
        <button type="button" id="download-btn" onclick="downloadImage()">画像保存</button>
      </div>
    </form>
    <div id="output-area"><canvas id="card-canvas" width="800" height="650"></canvas><img id="final-image"></div>
  </div>

<script>
const imagePath = "./image/ProfileSelectPNG/";
const charList = [
  { name: "博麗霊夢", file: "Select_01Reimu.png" },
  { name: "霧雨魔理沙", file: "Select_02Marisa.png" },
  { name: "十六夜咲夜", file: "Select_03Sakuya.png" },
  { name: "アリス", file: "Select_04Alice.png" },
  { name: "パチュリー", file: "Select_05Patchouli.png" },
  { name: "魂魄妖夢", file: "Select_06Youmu.png" },
  { name: "レミリア", file: "Select_07Remilia.png" },
  { name: "西行寺幽々子", file: "Select_08Yuyuko.png" },
  { name: "八雲紫", file: "Select_09Yukari.png" },
  { name: "伊吹萃香", file: "Select_10Suika.png" },
  { name: "鈴仙", file: "Select_11Udonge.png" },       // Reisen → Udonge に修正
  { name: "射命丸文", file: "Select_12Aya.png" },
  { name: "小野塚小町", file: "Select_13Komachi.png" },
  { name: "永江衣玖", file: "Select_14Iku.png" },
  { name: "比那名居天子", file: "Select_15Tenshi.png" },
  { name: "東風谷早苗", file: "Select_16Sanae.png" },
  { name: "チルノ", file: "Select_17Chirno.png" },      // Cirno → Chirno に修正
  { name: "紅美鈴", file: "Select_18Meirin.png" },
  { name: "霊烏路空", file: "Select_19Utsuho.png" },
  { name: "洩矢諏訪子", file: "Select_20Suwako.png" }
];

let selectedMain = charList[0], selectedSubs = [];
let charImage = new Image();

window.onload = () => {
  const mS = document.getElementById('main-char-selector'), sS = document.getElementById('sub-char-selector');
  charList.forEach(char => {
    // メイン
    const mb = document.createElement('div'); mb.className = 'char-btn';
    mb.setAttribute('data-name', char.name);
    const mImg = document.createElement('img'); mImg.src = imagePath + char.file;
    mb.appendChild(mImg);
    if(char.name === selectedMain.name) mb.classList.add('selected');
    mb.onclick = () => {
      document.querySelectorAll('#main-char-selector .char-btn').forEach(e => e.classList.remove('selected'));
      mb.classList.add('selected'); selectedMain = char; loadCharImage();
    };
    mS.appendChild(mb);
    
    // サブ
    const sb = document.createElement('div'); sb.className = 'char-btn';
    sb.setAttribute('data-name', char.name);
    const sImg = document.createElement('img'); sImg.src = imagePath + char.file;
    sb.appendChild(sImg);
    sb.onclick = () => {
      if(selectedSubs.includes(char.name)){
        selectedSubs = selectedSubs.filter(n => n !== char.name);
        sb.classList.remove('selected');
      } else {
        selectedSubs.push(char.name);
        sb.classList.add('selected');
      }
      updatePreview();
    };
    sS.appendChild(sb);
  });
  loadCharImage();
};

function loadCharImage() {
  charImage.src = imagePath + selectedMain.file;
  charImage.onload = updatePreview;
  charImage.onerror = () => { console.error("画像エラー:", charImage.src); updatePreview(); };
}

function updatePreview() {
  const canvas = document.getElementById('card-canvas'), ctx = canvas.getContext('2d'), brass = '#daa520';
  ctx.fillStyle = '#1a0f0a'; ctx.fillRect(0, 0, 800, 650);
  ctx.fillStyle = 'rgba(218, 165, 32, 0.05)';
  for(let i=0; i<800; i+=4) { for(let j=0; j<650; j+=4) { ctx.fillRect(i, j, 1, 1); } }
  ctx.strokeStyle = brass; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 760, 610);

  ctx.lineJoin = "round"; ctx.miterLimit = 2;

  const drawOutlinedText = (text, x, y, font, fill, width=4) => {
    ctx.font = font; ctx.lineWidth = width; ctx.strokeStyle = '#000';
    ctx.strokeText(text || '---', x, y); ctx.fillStyle = fill; ctx.fillText(text || '---', x, y);
  };

  drawOutlinedText('⚙ HISOUTENSOKU PROFILE ⚙', 50, 70, 'bold 24px Oswald', brass, 5);
  drawOutlinedText('PLAYER NAME', 55, 130, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(document.getElementById('name').value, 55, 185, '900 45px "Noto Serif JP"', '#fdf5e6', 6);
  
  drawOutlinedText('RANK / STATUS', 55, 240, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(document.getElementById('rank').value, 55, 275, '700 25px Oswald', '#fdf5e6', 4);
  
  drawOutlinedText('MAIN CHARACTER', 55, 335, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(selectedMain.name, 55, 365, '700 20px "Noto Serif JP"', '#fdf5e6', 4);

  drawOutlinedText('SUB CHARACTERS', 55, 415, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(selectedSubs.join(' / ') || 'なし', 55, 445, '16px "Noto Serif JP"', '#fdf5e6', 3);

  const h = document.querySelector('input[name="host"]:checked').value;
  const c = document.querySelector('input[name="client"]:checked').value;
  drawOutlinedText('CONNECTION', 55, 500, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(`HOST: ${h} / CLIENT: ${c}`, 55, 530, '18px sans-serif', '#fdf5e6', 3);

  drawOutlinedText('ACTIVE TIME', 55, 575, 'bold 14px Oswald', brass, 3);
  drawOutlinedText(document.getElementById('time').value, 55, 600, '18px sans-serif', '#fdf5e6', 3);

  if(charImage.complete && charImage.naturalWidth !== 0) {
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 12;
    ctx.drawImage(charImage, 450, 90, 300, 300); 
    ctx.restore();
    ctx.strokeStyle = brass; ctx.lineWidth = 2; ctx.strokeRect(448, 88, 304, 304);
  }

  drawOutlinedText('MESSAGE', 450, 440, 'bold 14px Oswald', brass, 3);
  const comment = document.getElementById('comment').value || '---';
  ctx.font = '15px "Noto Serif JP"';
  ctx.fillStyle = '#fdf5e6';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
  let line = '', yPos = 470;
  for(let n=0; n<comment.length; n++){
    let test = line + comment[n];
    if(ctx.measureText(test).width > 300 && n > 0){
      ctx.strokeText(line, 450, yPos); ctx.fillText(line, 450, yPos); line = comment[n]; yPos += 22;
    } else { line = test; }
  }
  ctx.strokeText(line, 450, yPos); ctx.fillText(line, 450, yPos);

  document.getElementById('final-image').src = canvas.toDataURL('image/png');
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `Profile_${document.getElementById('name').value || 'th123'}.png`;
  link.href = document.getElementById('final-image').src;
  link.click();
}
</script>
</body>
</html>
